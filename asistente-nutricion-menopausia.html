/* ---------------- PANTALLA 2: MENÚ DE HOY ---------------- */
function RecipeCard({r, defaultOpen, onSwap}){
  const [open,setOpen] = useState(!!defaultOpen);
  const mealLabel = r.generada ? "✨ Tu receta" : (MEAL_LABEL[r.tipo] || "Receta");
  const mealColor = r.generada ? "#D6512B" : ({desayuno:"#B07A2E",comida:"#D6512B",merienda:"#2F8472",cena:"#7E62A0"}[r.tipo] || "#D6512B");
  return (
    <div className="recipe">
      <div className="recipe-cover" onClick={()=>setOpen(o=>!o)}
        style={{background:`linear-gradient(115deg, ${mealColor}, ${mealColor}cc 55%, ${mealColor}99)`}}>
        <span className="rc-emoji">{heroEmoji(r)}</span>
        <span className="rc-text">
          <span className="rc-meal">{mealLabel}</span>
          <span className="rc-ttl">{r.nombre}</span>
        </span>
        <span className="rc-chev">{open?"▾":"▸"}</span>
      </div>
      <div className="recipe-meta2">
        <span className="meta-pill">⏱ {r.tiempo} min</span>
        <span className="meta-pill prot">Proteína {Math.round(r.macros.prot)} g</span>
        <span className="meta-pill" style={{color:"var(--gold)"}}>Grasa {Math.round(r.macros.fat)} g</span>
        <span className="meta-pill">{Math.round(r.macros.kcal)} kcal</span>
        {onSwap && <span className="swap-btn" style={{marginLeft:"auto"}} onClick={(e)=>{e.stopPropagation();onSwap();}}>🔄 Cambiar</span>}
      </div>
      {open &&
        <div className="recipe-body">
          <h5>Ingredientes</h5>
          <ul>{r.ing.map((it,i)=><li key={i}>{getFood(it.nombre)?.em||"•"} {it.nombre} — {it.g} g</li>)}</ul>
          <h5>Preparación</h5>
          <ol>{r.pasos.map((p,i)=><li key={i}>{p}</li>)}</ol>
          <div className="tags">{r.tags.filter(t=>t!=="veg"&&t!=="sinLactosa").map(t=><span className="ttag" key={t}>{t}</span>)}
            {r.tags.includes("veg")&&<span className="ttag">vegetariana</span>}
            {r.tags.includes("sinLactosa")&&<span className="ttag">sin lactosa</span>}
          </div>
        </div>}
    </div>
  );
}
function Menu({store,setStore,go,toast}){
  const [verSemana,setVerSemana] = useState(false);
  const menu = store.menu;
  const profile = store.profile;
  const di = weekdayIdx();

  const regen = ()=> setStore(s=>({...s, menu:{seed:Math.floor(Math.random()*99999), generadoEl:todayISO(),
                  dias: genMenu(s.profile, s.despensa||[], Math.floor(Math.random()*99999))}}));
  // intercambiar una sola comida (el turno = el tipo de receta)
  const swap = (dayIdx, mealKey)=> setStore(s=>{
    if(!s.menu) return s;
    const dias = s.menu.dias.map((d,i)=> i!==dayIdx ? d : {...d, [mealKey]: altRecipe(s.profile, s.despensa||[], mealKey, d[mealKey])});
    return {...s, menu:{...s.menu, dias}};
  });
  const toggleSnack = ()=> setStore(s=>{
    const snack = !s.profile.snack;
    const profile = {...s.profile, snack};
    // regenera el menú para añadir/quitar la merienda (mantiene el plan y la semilla)
    const menu = s.menu ? {...s.menu, dias: genMenu(profile, s.despensa||[], s.menu.seed||1)} : s.menu;
    return {...s, profile, menu};
  });

  const hoy = menu ? menu.dias[di] : null;
  const planLabel = (PLANS[profile.plan]||PLANS.lowcarb).label;
  const namesOf = (d)=> dayRecipesRaw(d).map(r=>({label:MEAL_LABEL[r.tipo], r}));
  const buildMenuText = ()=> !menu ? "" : "🍽️ Mi menú semanal · DietdesES3 ("+planLabel+")\n\n"+
    menu.dias.map(d=> d.dia.toUpperCase()+"\n"+ namesOf(d).map(o=>"  "+o.label+": "+o.r.nombre).join("\n")).join("\n\n");
  const menuWhatsApp = ()=> shareText("Mi menú semanal", buildMenuText(), toast);
  const menuPDF = ()=>{
    if(!menu) return;
    const cuerpo = menu.dias.map(d=>{ const rs=scaledDayRecipes(profile,d); const tot=dayTotals(profile,d);
      return "<h2>"+d.dia+" <span class='tot'>· "+Math.round(tot.kcal)+" kcal · "+Math.round(tot.prot)+" g proteína</span></h2>"+
        rs.map(r=>"<h3>"+MEAL_LABEL[r.tipo]+" · "+r.nombre+" <span>("+Math.round(r.macros.kcal)+" kcal · "+Math.round(r.macros.prot)+" g prot)</span></h3><p class='ing'>"+ r.ing.map(it=>it.nombre+" "+it.g+" g").join(" · ")+"</p>").join(""); }).join("");
    printHTML("<h1>🍽️ Mi menú semanal</h1><div class='sub'>DietdesES3 · "+planLabel+"</div>"+cuerpo);
  };

  return (
    <div>
      <h2 className="screen-title">Menú</h2>
      <p className="screen-sub">{menu ? <>Generado el {fmtDate(menu.generadoEl)} · {planLabel}</> : "Recetas de menos de 50 minutos, ajustadas a tu objetivo"}</p>

      {/* Ajustes rápidos del menú */}
      <div className="card">
        <div className="ctl-row">
          <div className="tx">🍎 Incluir merienda<small>Añade un snack proteico al día</small></div>
          <Toggle on={!!profile.snack} onClick={toggleSnack}/>
        </div>
      </div>

      {!menu ? (
        <div className="empty"><span className="em">🍽️</span>Genera un <span className="ac">menú semanal</span> completo a partir de lo que tienes en casa y tu objetivo.
          <div style={{marginTop:16}}><button className="btn sage" onClick={regen}>📅 Generar menú semanal</button></div>
        </div>
      ) : <>
        {!verSemana ? <>
          <div className="chip sage" style={{margin:"4px 0 12px"}}>📅 Hoy es {hoy.dia}</div>
          <DayMacros profile={profile} day={hoy}/>
          {scaledDayRecipes(profile,hoy).map((r)=>
            <RecipeCard key={r.tipo+r.id} r={r} defaultOpen={r.tipo==='comida'} onSwap={()=>swap(di, r.tipo)}/>)}
        </> : <>
          <div className="daystrip">
            {menu.dias.map((d,idx)=>{ const t=calcTargets(profile); const m=dayTotals(profile,d);
              const isCap=t.carbMode==='keto'||t.carbMode==='lowcarb'; const over=isCap&&m.carbs>t.carbs+2;
              return <div className="daychip" key={idx}>
                <div className="dc-d">{d.dia.slice(0,3)}</div>
                <div className="dc-k">{Math.round(m.kcal)}<span style={{fontSize:9,color:'var(--quiet)'}}> kcal</span></div>
                <div className="dc-p">{Math.round(m.prot)} g prot</div>
                {isCap && <div className={"dc-c "+(over?'over':'ok')}>{Math.round(m.carbs)}/{t.carbs} carb</div>}
              </div>;
            })}
          </div>
          {menu.dias.map((d,idx)=>(
            <div key={idx} style={{marginBottom:18}}>
              <div className="chip" style={{marginBottom:9}}>{d.dia}</div>
              {scaledDayRecipes(profile,d).map(r=><RecipeCard key={d.dia+r.tipo+r.id} r={r} onSwap={()=>swap(idx, r.tipo)}/>)}
            </div>
          ))}
        </>}
        <p className="label" style={{marginTop:16}}>📤 Compartir el menú</p>
        <div className="row2">
          <button className="btn sm sage" onClick={menuWhatsApp}>📲 WhatsApp</button>
          <button className="btn sm" onClick={menuPDF}>📄 PDF / Imprimir</button>
        </div>
        <button className="btn" style={{marginTop:14}} onClick={()=>go("compra")}>🛒 Lista de la compra de la semana →</button>
        <p className="hint" style={{textAlign:"center",margin:"7px 0 0"}}>Incluye todo lo que necesitas para este menú y no tienes en casa. También se envía por WhatsApp o PDF.</p>
        <div className="row2" style={{marginTop:14}}>
          <button className="btn sec" onClick={()=>setVerSemana(v=>!v)}>{verSemana?"Ver solo hoy":"Ver semana completa"}</button>
          <button className="btn sage" onClick={regen}>🔄 Regenerar</button>
        </div>
      </>}
    </div>
  );
}

/* ---------------- PANTALLA: COCINA AHORA (recetas con lo que tengo) ---------------- */
function Cocina({store,setStore,go,toast}){
  const profile = store.profile;
  const despensa = store.despensa||[];
  const have = useMemo(()=> new Set(despensa.map(d=>d.nombre.toLowerCase())), [despensa]);
  const [filtro,setFiltro] = useState("todas");
  const [receta,setReceta] = useState(null);
  const crear = ()=> setReceta(generarReceta(profile, despensa, Math.floor(Math.random()*1e9)));

  const ranked = useMemo(()=>{
    return RECIPES
      .filter(r=> filtro==="todas" ? r.tipo!=="merienda" : r.tipo===filtro)
      .filter(r=> recipeAllowed(r, profile))
      .map(r=>{
        const missing = r.ing.filter(it=> getFood(it.nombre) && !have.has(it.nombre.toLowerCase()) && !STAPLES.has(it.nombre.toLowerCase()));
        const matched = r.ing.length - missing.length;
        return {r, missing, matched, score: matched - missing.length*0.7 + r.macros.prot/40};
      })
      .sort((a,b)=> (a.missing.length-b.missing.length) || (b.score-a.score));
  },[profile, filtro, have]);

  const puedoYa = ranked.filter(o=>o.missing.length===0);
  const casi    = ranked.filter(o=>o.missing.length>0 && o.missing.length<=2);

  const addFaltan = (missing)=> { setStore(s=>{
      const ex=[...(s.extraCompra||[])];
      missing.forEach(it=>{ if(!ex.some(e=>e.nombre===it.nombre)){ const f=getFood(it.nombre); ex.push({nombre:it.nombre, g:f?f.porcion:0}); } });
      return {...s, extraCompra:ex};
    }); toast&&toast("Añadido a la compra ✓"); };

  const FILTERS=[["todas","Todas"],["desayuno","Desayuno"],["comida","Comida"],["cena","Cena"],["merienda","Merienda"]];

  const row = (o, open)=> (
    <div key={o.r.id} style={{marginBottom:4}}>
      <div className="cocina-tags">
        {o.missing.length===0
          ? <span className="match have">✓ Tienes todo</span>
          : <span className="match miss">Te falta: {o.missing.map(m=>m.nombre).join(", ")}</span>}
        {o.missing.length>0 && o.missing.length<=4 &&
          <button className="match addc" onClick={()=>addFaltan(o.missing)}>🛒 + a la compra</button>}
      </div>
      <RecipeCard r={scaleRecipeToMeal(o.r, profile)} defaultOpen={open}/>
    </div>
  );

  return (
    <div>
      <h2 className="screen-title">Cocina <span className="ac">ahora</span></h2>
      <p className="screen-sub">Recetas que puedes hacer con lo que tienes en casa</p>

      {/* generador (variedad infinita) */}
      <div className="card" style={{background:"rgba(255,107,71,.07)",borderColor:"rgba(255,107,71,.22)"}}>
        <h3><span className="em">✨</span> Créame una receta</h3>
        <p className="hint" style={{margin:"-6px 0 12px"}}>Un plato a tu medida con lo que tienes y tu objetivo.</p>
        <button className="btn" onClick={crear}>✨ Crear receta para mí</button>
        {receta && <div style={{marginTop:14}}>
          <RecipeCard r={receta} defaultOpen={true}/>
          <button className="btn sec" onClick={crear}>🔄 Otra receta</button>
        </div>}
      </div>

      {despensa.length===0 &&
        <div className="banner"><span className="em">🧺</span>
          <span className="tx">Dime qué tienes en casa (en <b>Inicio</b>) y te marco las recetas que puedes hacer sin comprar nada.</span>
          <button className="btn sm" onClick={()=>go("registro")}>Inicio</button></div>}

      {/* filtro por tipo de comida */}
      <div className="seg" style={{marginBottom:14,flexWrap:"wrap"}}>
        {FILTERS.map(([k,l])=><button key={k} className={filtro===k?"on":""} onClick={()=>setFiltro(k)}>{l}</button>)}
      </div>

      {puedoYa.length>0 && <>
        <p className="label">✅ Puedes cocinarlas ya ({puedoYa.length})</p>
        {puedoYa.slice(0,8).map((o,i)=>row(o, i===0))}
      </>}

      {casi.length>0 && <>
        <p className="label" style={{marginTop:10}}>🛒 Casi las tienes — te falta poco</p>
        {casi.slice(0,8).map(o=>row(o,false))}
      </>}

      {puedoYa.length===0 && casi.length===0 && <>
        <p className="label" style={{marginTop:4}}>Ideas para cocinar</p>
        {ranked.slice(0,10).map(o=>row(o,false))}
      </>}
    </div>
  );
}

/* ---------------- PANTALLA 3: LISTA DE LA COMPRA ---------------- */
function Compra({store,setStore,toast}){
  const [nuevo,setNuevo] = useState("");
  const [closed,setClosed] = useState({});   // grupos colapsados
  const menu = store.menu;

  const lista = useMemo(()=>{
    const need = {};
    if(menu){ menu.dias.forEach(d=>{ scaledDayRecipes(store.profile, d).forEach(r=>{
      r.ing.forEach(it=>{ need[it.nombre]=(need[it.nombre]||0)+ it.g; });
    });}); }
    (store.extraCompra||[]).forEach(it=>{ if(!(it.nombre in need)) need[it.nombre]=it.g||0; });
    const enCasa = new Set((store.despensa||[]).map(i=>i.nombre.toLowerCase()));
    return Object.entries(need)
      .filter(([n])=> !enCasa.has(n.toLowerCase()))
      .map(([nombre,g])=>{ const f=getFood(nombre); return {nombre, g:g?Math.ceil(g/10)*10:0, cat:f?f.cat:"otros", em:f?f.em:"🛒"}; });
  },[menu, store.despensa, store.extraCompra, store.profile]);

  const toggle = (n)=> setStore(s=>({...s, comprado:{...s.comprado, [n]: !s.comprado[n]}}));
  const tengo = (it)=> setStore(s=>({...s,
     despensa:[...(s.despensa||[]), {nombre:it.nombre}],
     extraCompra:(s.extraCompra||[]).filter(e=>e.nombre!==it.nombre) }));
  const addExtra = ()=>{ const n=nuevo.trim(); if(!n) return; const f=getFood(n);
     setStore(s=>({...s, extraCompra:[...(s.extraCompra||[]), {nombre:f?f.nombre:n, g:f?f.porcion:0}]})); setNuevo(""); };

  const grouped = SHOP_GROUPS.map(g=>({...g, items: lista.filter(it=>g.key.includes(it.cat))})).filter(g=>g.items.length);
  const total = lista.length;
  const comprados = lista.filter(it=>store.comprado[it.nombre]).length;

  const buildText = ()=> "🛒 Mi compra · DietdesES3\n\n" + grouped.map(g=>
      g.em+" "+g.label.toUpperCase()+"\n" + g.items.map(it=>{ const u=unidadCompra(it.nombre,it.g,it.cat);
        return "•  "+it.nombre+(u.main?"  —  "+u.main:""); }).join("\n")).join("\n\n");

  const enviarWhatsApp = ()=> shareText("Mi lista de la compra", buildText(), toast);

  const descargarPDF = ()=>{
    const filas = grouped.map(g=> "<h2>"+g.em+" "+g.label+"</h2><ul>"+ g.items.map(it=>{ const u=unidadCompra(it.nombre,it.g,it.cat);
      return "<li>"+it.nombre+(u.main?" — <b>"+u.main+"</b>":"")+"</li>"; }).join("")+"</ul>").join("");
    printHTML("<h1>🛒 Mi lista de la compra</h1><div class='sub'>DietdesES3 · "+fmtDate(todayISO())+"</div>"+filas);
  };

  return (
    <div>
      <h2 className="screen-title">Lista de la <span className="ac">compra</span></h2>
      <p className="screen-sub">{menu ? "Todo lo que necesitas para tu menú semanal y no tienes en casa" : "Lo que necesitas y no tienes en casa"}</p>

      {total>0 &&
        <>
        <div className="compra-head">
          <span className="chip">{comprados} de {total} comprados</span>
          <div style={{display:"flex",gap:8}}>
            <button className="btn sm sage" onClick={enviarWhatsApp}>📲 WhatsApp</button>
            <button className="btn sm" onClick={descargarPDF}>📄 PDF / Imprimir</button>
          </div>
        </div>
        {menu && <p className="hint" style={{margin:"-4px 0 14px"}}>🗓️ Generada desde tu <b>menú semanal</b>.</p>}
        </>}

      {total===0 &&
        (menu
          ? <div className="empty"><span className="em">✅</span>¡Lo tienes todo en casa para tu menú!</div>
          : <div className="empty"><span className="em">🛒</span>Crea tu <span className="ac">menú semanal</span> (pestaña Semana) y aquí tendrás la lista de la compra para enviar o imprimir.</div>)}

      {grouped.map(g=>{ const isClosed=!!closed[g.label];
        return (
        <div className="shop-group" key={g.label}>
          <div className="gh" onClick={()=>setClosed(c=>({...c,[g.label]:!c[g.label]}))} style={{cursor:"pointer",justifyContent:"space-between",display:"flex",alignItems:"center"}}>
            <span>{g.em} {g.label} <span style={{color:"var(--quiet)",fontWeight:400}}>({g.items.length})</span></span>
            <span style={{color:"var(--quiet)",fontSize:15}}>{isClosed?"▸":"▾"}</span>
          </div>
          {!isClosed && g.items.map(it=>{ const done=!!store.comprado[it.nombre]; const u=unidadCompra(it.nombre,it.g,it.cat);
            return (
              <div className={"shop-item"+(done?" done":"")} key={it.nombre}>
                <span className="box" onClick={()=>toggle(it.nombre)}>{done?"✓":""}</span>
                <div className="si-main" onClick={()=>toggle(it.nombre)}>
                  <span className="nm">{it.em} {it.nombre}</span>
                  {u.sub && <span className="si-sub">{u.sub}</span>}
                </div>
                {u.main && <span className="qt">{u.main}</span>}
                <button className="si-have" title="Ya lo tengo en casa" onClick={()=>tengo(it)}>🏠</button>
              </div>);
          })}
        </div>);
      })}

      <p className="label" style={{marginTop:18}}>¿Falta algo? Añádelo a la lista</p>
      <div className="add-row">
        <div className="grow">
          <input type="text" list="dbfoods3" placeholder="ej: papel de cocina, fruta, detergente…" value={nuevo}
            onChange={e=>setNuevo(e.target.value)}
            onKeyDown={e=>{ if(e.key==="Enter"&&nuevo) addExtra(); }}/>
          <datalist id="dbfoods3">{DB.map(f=><option key={f.nombre} value={f.nombre}/>)}</datalist>
        </div>
        <button className="btn sm" style={{flex:"none"}} onClick={addExtra}>＋</button>
      </div>

      {total>0 && <button className="btn sec" style={{marginTop:14}} onClick={()=>setStore(s=>({...s,comprado:{}}))}>Desmarcar todo</button>}
      <p className="hint" style={{textAlign:"center",marginTop:16}}>Toca 🏠 en un producto si ya lo tienes en casa. Lo que tienes se gestiona en <span className="ac">Inicio</span>.</p>
    </div>
  );
}

/* ---------------- PANTALLA 4: HISTORIAL ---------------- */
function Historial({store}){
  const last14 = useMemo(()=>{
    const out=[];
    for(let i=0;i<14;i++){ const d=new Date(); d.setDate(d.getDate()-i);
      const iso=d.getFullYear()+"-"+String(d.getMonth()+1).padStart(2,"0")+"-"+String(d.getDate()).padStart(2,"0");
      const dia=store.dias[iso]; if(dia&&dia.ingredientes?.length) out.push({iso,dia});
    }
    return out;
  },[store.dias]);

  return (
    <div>
      <h2 className="screen-title">Historial</h2>
      <p className="screen-sub">Tus últimos <span className="ac">14 días</span></p>
      {last14.length===0 ? <div className="empty"><span className="em">📅</span>Todavía no hay registros. Empieza añadiendo ingredientes en «<span className="ac">Hoy</span>».</div>
      : <div className="hist">
          {last14.map(({iso,dia})=>{
            const t=calcTargets(store.profile);
            const m=sumMacros(dia.ingredientes||[]);
            const pp=t.prot?Math.min(100,Math.round(m.prot/t.prot*100)):0;
            const fp=t.fat?Math.min(100,Math.round(m.fat/t.fat*100)):0;
            return (
              <div className="hday" key={iso}>
                <div className="hday-top">
                  <span className="date">{fmtDate(iso)}</span>
                  <span className="small">{dia.ingredientes?.length||0} ingredientes</span>
                </div>
                <div className="hbars">
                  <div className="hbar"><div className="l"><span>Proteína</span><span>{Math.round(m.prot)}/{t.prot}g</span></div>
                    <div className="t"><i style={{width:pp+"%",background:"var(--prot)"}}/></div></div>
                  <div className="hbar"><div className="l"><span>Grasas</span><span>{Math.round(m.fat)}/{t.fat}g</span></div>
                    <div className="t"><i style={{width:fp+"%",background:"var(--fat)"}}/></div></div>
                  <div className="hbar"><div className="l"><span>Kcal</span><span>{Math.round(m.kcal)}</span></div>
                    <div className="t"><i style={{width:(t.kcal?Math.min(100,m.kcal/t.kcal*100):0)+"%",background:"var(--kcal)"}}/></div></div>
                </div>
              </div>);
          })}
        </div>}
    </div>
  );
}

/* ---------------- AJUSTES ---------------- */
function Ajustes({store,setStore,toast}){
  const p=store.profile;
  const setP=(patch)=>setStore(s=>({...s, profile:{...s.profile,...patch,onboarded:true}}));
  const toggleSnack=()=>setStore(s=>{ const snack=!s.profile.snack; const profile={...s.profile,snack,onboarded:true};
    const menu = s.menu ? {...s.menu, dias:genMenu(profile, s.despensa||[], s.menu.seed||1)} : s.menu; return {...s, profile, menu}; });
  const t=calcTargets(p,null);
  return (
    <div>
      <h2 className="screen-title">Mis datos</h2>
      <p className="screen-sub">Tus datos y tu objetivo nutricional</p>

      <div className="card">
        <h3><span className="em">👤</span> Tus datos</h3>
        <div className="field"><label>Nombre</label>
          <input type="text" value={p.nombre} placeholder="Tu nombre" onChange={e=>setP({nombre:e.target.value})}/></div>
        <div className="field"><label>Sexo</label>
          <select value={p.sexo} onChange={e=>setP({sexo:e.target.value})}>
            <option value="mujer">Mujer</option>
            <option value="hombre">Hombre</option>
          </select></div>
        <div className="row3">
          <div className="field"><label>Peso (kg)</label><input type="number" value={p.peso} onChange={e=>setP({peso:e.target.value})}/></div>
          <div className="field"><label>Altura (cm)</label><input type="number" value={p.altura} onChange={e=>setP({altura:e.target.value})}/></div>
          <div className="field"><label>Edad</label><input type="number" value={p.edad} onChange={e=>setP({edad:e.target.value})}/></div>
        </div>
        {p.sexo==='mujer' &&
          <div className="field"><label>Etapa (opcional)</label>
            <select value={p.etapa} onChange={e=>setP({etapa:e.target.value})}>
              <option value="ninguna">— No aplica —</option>
              <option value="perimenopausia">Perimenopausia</option>
              <option value="menopausia">Menopausia</option>
              <option value="postmenopausia">Postmenopausia</option>
            </select></div>}
        <div className="field" style={{marginBottom:0}}><label>Nivel de actividad</label>
          <select value={p.actividad} onChange={e=>setP({actividad:e.target.value})}>
            <option value="sedentaria">Sedentaria (poco o nada de ejercicio)</option>
            <option value="ligera">Ligera (1-3 días/semana)</option>
            <option value="moderada">Moderada (3-5 días/semana)</option>
            <option value="activa">Activa (6-7 días/semana)</option>
          </select></div>
      </div>

      <div className="card">
        <h3><span className="em">🍽️</span> Tu enfoque</h3>
        <div className="seg" style={{flexDirection:"column",gap:8}}>
          {Object.entries(PLANS).map(([k,pl])=>
            <button key={k} className={p.plan===k?"on":""} style={{textAlign:"left",padding:"12px 14px"}}
              onClick={()=>setP({plan:k})}>
              <div style={{fontSize:14}}>{pl.em} {pl.label}</div>
              <div style={{fontSize:11.5,fontWeight:600,opacity:.85,marginTop:2}}>{pl.nota}</div>
            </button>)}
        </div>
        <div className="switch" style={{marginTop:6}}><div className="tx">🌿 Antiinflamatoria<small>Prioriza omega-3, verdura, fibra y pescado azul sobre cualquier enfoque</small></div>
          <Toggle on={!!p.antiinflamatoria} onClick={()=>setP({antiinflamatoria:!p.antiinflamatoria})}/></div>
      </div>

      <div className="card">
        <h3><span className="em">🎯</span> Objetivo</h3>
        <div className="seg">
          {Object.entries(GOALS).map(([k,g])=>
            <button key={k} className={p.objetivo===k?"on":""} onClick={()=>setP({objetivo:k})}>{g.em} {g.label}</button>)}
        </div>
      </div>

      <div className="card">
        <h3><span className="em">🥗</span> Preferencias y alergias</h3>
        <div className="switch"><div className="tx">Sin lactosa<small>Excluye lácteos en cualquier plan</small></div>
          <Toggle on={p.sinLactosa} onClick={()=>setP({sinLactosa:!p.sinLactosa})}/></div>
        <div className="switch"><div className="tx">Sin gluten<small>Excluye trigo, centeno, espelta, seitán…</small></div>
          <Toggle on={p.sinGluten} onClick={()=>setP({sinGluten:!p.sinGluten})}/></div>
        <div className="switch"><div className="tx">Sin frutos secos<small>Excluye nueces, almendras, anacardos…</small></div>
          <Toggle on={p.sinFrutosSecos} onClick={()=>setP({sinFrutosSecos:!p.sinFrutosSecos})}/></div>
        <div className="switch"><div className="tx">Sin huevo<small>Excluye el huevo de recetas y sugerencias</small></div>
          <Toggle on={p.sinHuevo} onClick={()=>setP({sinHuevo:!p.sinHuevo})}/></div>
      </div>

      <div className="card">
        <h3><span className="em">🍽️</span> Tu menú</h3>
        <div className="switch" style={{paddingTop:0,paddingBottom:0,borderTop:"none"}}><div className="tx">Incluir merienda<small>Añade un snack proteico al día</small></div>
          <Toggle on={!!p.snack} onClick={toggleSnack}/></div>
      </div>

      <div className="card" style={{background:"rgba(255,107,71,.08)",borderColor:"rgba(255,107,71,.22)"}}>
        <h3><span className="em">📊</span> Tus macros calculados</h3>
        <div className="hint" style={{fontSize:13}}>
          Metabolismo basal: <b>{t.bmr} kcal</b> · Gasto diario estimado: <b>{t.tdee} kcal</b><br/>
          Objetivo diario: <b>{t.kcal} kcal</b> · Proteína <b>{t.prot} g</b> · Grasas <b>{t.fat} g</b> · Carbos <b>{t.carbs} g</b>
        </div>
      </div>

      <div className="card">
        <h3><span className="em">♻️</span> Reiniciar</h3>
        <p className="hint" style={{marginTop:-4,marginBottom:12}}>¿Empezar limpio? Vacía solo tu lista, o resetéalo todo.</p>
        <button className="btn sec" onClick={()=>{ if(confirm("¿Vaciar tu despensa, tu menú y tu lista de la compra? Tus datos, plan y objetivo se mantienen.")){ setStore(s=>({...s, despensa:[], extraCompra:[], comprado:{}, menu:null, stockLibre:""})); toast&&toast("Despensa y compra vacías ✓"); } }}>🧹 Vaciar despensa, menú y compra</button>
        <button className="btn ghost" style={{marginTop:10}}
          onClick={()=>{ if(confirm("¿Resetear TODO (datos, plan, despensa, menú y compra) y empezar de cero? No se puede deshacer.")){ localStorage.removeItem(KEY); location.reload(); } }}>🔄 Resetear todo y empezar de cero</button>
      </div>

      <button className="btn" onClick={()=>toast("Guardado ✓")}>Guardar y volver</button>
      <p className="disclaimer">Esta app ofrece orientación nutricional general basada en fórmulas estándar (Mifflin-St Jeor). No sustituye el consejo de tu médico o dietista-nutricionista.</p>
    </div>
  );
}

/* ---------------- ONBOARDING (primer arranque / tras reset) ---------------- */
function Onboarding({store,setStore}){
  // Inicializa con valores válidos por defecto SIN dejar que los campos vacíos del perfil los machaquen
  const [p,setP] = useState(()=>{ const sp=store.profile||{};
    return { nombre: sp.nombre||"", sexo: (sp.sexo==="hombre"?"hombre":"mujer"),
             edad: sp.edad||"", peso: sp.peso||"", altura: sp.altura||"",
             actividad: sp.actividad||"ligera", objetivo: sp.objetivo||"adelgazar",
             plan: PLANS[sp.plan]?sp.plan:"lowcarb", antiinflamatoria: sp.antiinflamatoria!==false, onboarded:false }; });
  const set = (patch)=> setP(x=>({...x,...patch}));
  const valid = (+p.peso>0) && (+p.altura>0) && (+p.edad>0) && (p.sexo==="mujer"||p.sexo==="hombre");
  const finish = ()=>{ if(!valid) return; setStore(s=>({...s, profile:{...s.profile, ...p, onboarded:true}})); };
  return (
    <div className="app">
      <div className="orbs" aria-hidden="true"><i></i><i></i></div>
      <div className="content" style={{paddingTop:26}}>
        <div className="hero" style={{marginBottom:6}}>
          <div className="hero-eyebrow">Bienvenida a</div>
          <h1 className="hero-hi"><i style={{fontStyle:"normal",color:"var(--ink)"}}>Dietdes</i><i>es3</i></h1>
        </div>
        <p className="screen-sub">Dime tus datos y te calculo <span className="ac">qué comer cada día</span> para adelgazar cumpliendo tu proteína. Lo que no tengas en casa, a la lista de la compra.</p>

        <div className="card">
          <h3><span className="em">👤</span> Tus datos</h3>
          <div className="field"><label>Nombre (opcional)</label>
            <input type="text" value={p.nombre} placeholder="Tu nombre" onChange={e=>set({nombre:e.target.value})}/></div>
          <div className="field"><label>Sexo</label>
            <select value={p.sexo} onChange={e=>set({sexo:e.target.value})}>
              <option value="mujer">Mujer</option><option value="hombre">Hombre</option></select></div>
          <div className="row3">
            <div className="field"><label>Peso (kg)</label><input type="number" value={p.peso} placeholder="68" onChange={e=>set({peso:e.target.value})}/></div>
            <div className="field"><label>Altura (cm)</label><input type="number" value={p.altura} placeholder="165" onChange={e=>set({altura:e.target.value})}/></div>
            <div className="field"><label>Edad</label><input type="number" value={p.edad} placeholder="50" onChange={e=>set({edad:e.target.value})}/></div>
          </div>
          <div className="field" style={{marginBottom:0}}><label>Nivel de actividad</label>
            <select value={p.actividad} onChange={e=>set({actividad:e.target.value})}>
              <option value="sedentaria">Sedentaria (poco o nada de ejercicio)</option>
              <option value="ligera">Ligera (1-3 días/semana)</option>
              <option value="moderada">Moderada (3-5 días/semana)</option>
              <option value="activa">Activa (6-7 días/semana)</option></select></div>
        </div>

        <div className="card">
          <h3><span className="em">🎯</span> Tu objetivo</h3>
          <div className="seg">{Object.entries(GOALS).map(([k,g])=>
            <button key={k} className={p.objetivo===k?"on":""} onClick={()=>set({objetivo:k})}>{g.em} {g.label}</button>)}</div>
        </div>

        <div className="card">
          <h3><span className="em">🍽️</span> Tu enfoque</h3>
          <div className="seg" style={{flexDirection:"column",gap:8}}>{Object.entries(PLANS).map(([k,pl])=>
            <button key={k} className={p.plan===k?"on":""} style={{textAlign:"left",padding:"12px 14px"}} onClick={()=>set({plan:k})}>
              <div style={{fontSize:14}}>{pl.em} {pl.label}</div>
              <div style={{fontSize:11.5,fontWeight:600,opacity:.85,marginTop:2}}>{pl.nota}</div></button>)}</div>
          <div className="switch" style={{marginTop:6,paddingBottom:0}}><div className="tx">🌿 Antiinflamatoria<small>Prioriza omega-3, verdura, fibra y pescado azul</small></div>
            <Toggle on={!!p.antiinflamatoria} onClick={()=>set({antiinflamatoria:!p.antiinflamatoria})}/></div>
        </div>

        <button className="btn" disabled={!valid} onClick={finish}>{valid?"Empezar ✨":"Rellena peso, altura y edad"}</button>
        <p className="disclaimer">Orientación nutricional general (fórmula Mifflin-St Jeor). No sustituye el consejo de tu médico o dietista-nutricionista.</p>
      </div>
    </div>
  );
}

/* ============================================================
   APP
   ============================================================ */
function App(){
  const [store,setStore] = useStore();
  const [tab,setTab] = useState("registro");
  const [showAjustes,setShowAjustes] = useState(false);
  const [toastMsg,setToastMsg] = useState(null);
  const toast = (m)=>{ setToastMsg(m); setShowAjustes(false); setTimeout(()=>setToastMsg(null),1600); };

  const go = (t)=>{ if(t==="ajustes") setShowAjustes(true); else { setShowAjustes(false); setTab(t); } };

  const TABS=[
    {k:"registro",ic:"☀️",label:"Hoy"},
    {k:"menu",ic:"📅",label:"Semana"},
    {k:"compra",ic:"🛒",label:"Compra"},
  ];

  // Primer arranque (o tras reset): onboarding antes de mostrar nada
  if(!store.profile.onboarded) return <Onboarding store={store} setStore={setStore}/>;

  return (
    <div className="app">
      <div className="orbs" aria-hidden="true"><i></i><i></i><i></i></div>
      <div className="header">
        <div className="header-row">
          <div className="logo"><span className="mark">🌸</span><span className="wm">Dietdes<i>ES3</i></span></div>
          <div className="gear" onClick={()=>setShowAjustes(s=>!s)} role="button" aria-label="Mis datos">{showAjustes?"Cerrar":"Mis datos"}</div>
        </div>
        <div className="tagline">{(PLANS[store.profile.plan]||PLANS.lowcarb).tagline}</div>
        {!showAjustes &&
          <div className="subline">
            <span className="chip">{(PLANS[store.profile.plan]||PLANS.lowcarb).em} {(PLANS[store.profile.plan]||PLANS.lowcarb).label}</span>
            <span className="chip sage">{GOALS[store.profile.objetivo]?.em} {GOALS[store.profile.objetivo]?.label}</span>
          </div>}
      </div>

      <div className="content">
        {showAjustes ? <Ajustes store={store} setStore={setStore} toast={toast}/>
         : tab==="menu" ? <Menu store={store} setStore={setStore} go={go} toast={toast}/>
         : tab==="compra" ? <Compra store={store} setStore={setStore} toast={toast}/>
         : <Hoy store={store} setStore={setStore} go={go} toast={toast}/>}
      </div>

      {!showAjustes &&
        <div className="tabbar">
          {TABS.map(t=>
            <button key={t.k} className={"tab"+(tab===t.k?" on":"")} onClick={()=>setTab(t.k)}>
              <span className="ic">{t.ic}</span>{t.label}
            </button>)}
        </div>}

      {toastMsg && <div className="save-toast">{toastMsg}</div>}
    </div>
  );
}

ReactDOM.createRoot(document.getElementById("root")).render(<App/>);
</script>
</body>
</html>

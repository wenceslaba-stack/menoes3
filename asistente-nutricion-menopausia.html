<!-- React + Babel desde CDN. Tras la primera carga, el navegador los cachea y la app funciona sin conexión. -->
<script crossorigin src="https://unpkg.com/react@18.3.1/umd/react.production.min.js"></script>
<script crossorigin src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.production.min.js"></script>
<script src="https://unpkg.com/@babel/standalone@7.24.7/babel.min.js"></script>

<style>
  /* ===== Sistema de estilo DietDeses3 · crema editorial (familia NOES3) ===== */
  :root{
    --bg:#FFF4E6; --bg-soft:#FBEBD8; --card:#FFFFFF; --card-2:#F7ECDB;
    --ink:#241823; --muted:#5E5158; --quiet:#857681; --faint:#AB9EA6;
    --brand:#D6512B; --brand-d:#B23E1E; --brand-soft:#C24A29; --gold:#9C6B22;
    --calma:#2F8472; --lav:#7E62A0;
    --line:rgba(36,24,35,0.12);
    --prot:#E0552E; --fat:#D99A3F; --carb:#5C92B0; --kcal:#8A6FA8;
    --serif:'Fraunces',Georgia,serif;
    --sans:'Inter',system-ui,-apple-system,Segoe UI,Roboto,sans-serif;
    --mono:'SF Mono',ui-monospace,'Cascadia Code','Consolas',monospace;
    --r:18px;
  }
  html{color-scheme:light;}
  *{box-sizing:border-box;-webkit-tap-highlight-color:transparent;}
  html,body{margin:0;padding:0;}
  body{
    font-family:var(--sans);
    background:var(--bg); color:var(--ink); -webkit-font-smoothing:antialiased;
  }
  #root{min-height:100vh;}
  .app{max-width:520px;margin:0 auto;min-height:100vh;background:var(--bg);position:relative;padding-bottom:92px;}
  .header{
    position:sticky;top:0;z-index:20;background:rgba(255,244,230,.82);backdrop-filter:blur(10px);
    padding:16px 18px 13px;border-bottom:1px solid var(--line);
  }
  .header-row{display:flex;align-items:center;justify-content:space-between;gap:10px;}
  .logo{display:flex;align-items:center;gap:10px;font-family:var(--serif);font-weight:500;font-size:22px;letter-spacing:-.5px;color:var(--ink);}
  .logo .wm{white-space:nowrap;}
  .logo i{font-style:italic;color:var(--brand-soft);}
  .logo .mark{width:30px;height:30px;border-radius:9px;background:linear-gradient(135deg,var(--brand),#E8895C);display:grid;place-items:center;color:#FFF4E6;font-size:16px;}
  .gear{cursor:pointer;color:var(--quiet);font-family:var(--mono);font-size:11px;font-weight:600;letter-spacing:1.4px;text-transform:uppercase;padding:8px 2px;transition:color .15s;white-space:nowrap;}
  .gear:hover,.gear:active{color:var(--brand);}
  .subline{margin-top:10px;display:flex;gap:8px;flex-wrap:wrap;align-items:center;}
  .chip{display:inline-flex;align-items:center;gap:6px;padding:5px 10px;border-radius:7px;font-family:var(--mono);font-size:9.5px;font-weight:500;letter-spacing:1.2px;text-transform:uppercase;background:rgba(255,107,71,.1);color:var(--brand-soft);}
  .chip.sage{background:rgba(110,181,217,.12);color:var(--calma);}
  .chip.ghost{background:var(--card-2);color:var(--quiet);}
  .content{padding:18px 16px 8px;}
  h2.screen-title{font-family:var(--serif);font-weight:400;font-size:30px;margin:2px 0 4px;letter-spacing:-1px;line-height:1.05;color:var(--ink);}
  .screen-sub{font-family:var(--serif);font-style:italic;color:var(--muted);font-size:14.5px;margin:0 0 18px;line-height:1.5;}
  .ac{color:var(--brand-soft);}
  .screen-title .ac{font-style:italic;}
  .empty .ac{font-style:normal;font-weight:600;}
  .card{background:var(--card);border:1px solid var(--line);border-radius:var(--r);padding:17px;margin-bottom:14px;}
  .card h3{margin:0 0 14px;font-family:var(--serif);font-weight:400;font-size:18px;letter-spacing:-.3px;display:flex;align-items:center;gap:9px;color:var(--ink);}
  .card h3 .em{font-size:18px;}
  .label{font-family:var(--mono);font-size:10.5px;font-weight:600;color:var(--quiet);text-transform:uppercase;letter-spacing:1px;margin:0 0 8px;}

  /* Macro bars */
  .macro-hero{display:flex;align-items:center;gap:18px;margin-bottom:6px;}
  .kcal-ring{position:relative;width:100px;height:100px;flex:none;}
  .kcal-ring .big{position:absolute;inset:0;display:grid;place-items:center;text-align:center;}
  .kcal-ring .big b{font-family:var(--serif);font-style:italic;font-weight:400;font-size:30px;line-height:1;color:var(--ink);}
  .kcal-ring .big span{font-family:var(--mono);font-size:9.5px;color:var(--muted);font-weight:600;text-transform:uppercase;letter-spacing:.6px;}
  .macros{flex:1;display:flex;flex-direction:column;gap:12px;}
  .mrow-top{display:flex;justify-content:space-between;font-size:12.5px;font-weight:600;margin-bottom:6px;color:var(--ink);}
  .mrow-top .v{color:var(--muted);font-family:var(--mono);font-size:11px;font-weight:400;letter-spacing:.3px;}
  .bar{height:7px;border-radius:99px;background:rgba(36,24,35,.08);overflow:hidden;}
  .bar > i{display:block;height:100%;border-radius:99px;transition:width .4s ease;}
  .hint{font-size:12.5px;color:var(--muted);font-weight:400;line-height:1.6;margin-top:2px;}
  .hint b{color:var(--brand-soft);font-weight:600;}

  /* Inputs */
  .field{margin-bottom:13px;}
  .field label{display:block;font-family:var(--mono);font-size:10.5px;font-weight:600;color:var(--quiet);text-transform:uppercase;letter-spacing:1px;margin-bottom:7px;}
  input[type=text],input[type=number],select,textarea{
    width:100%;padding:12px 13px;border:1px solid var(--line);border-radius:12px;font-family:var(--sans);
    font-size:15px;font-weight:400;background:var(--card-2);color:var(--ink);outline:none;
  }
  input::placeholder,textarea::placeholder{color:var(--faint);}
  input:focus,select:focus,textarea:focus{border-color:var(--brand);}
  textarea{resize:vertical;min-height:64px;line-height:1.5;}
  .row2{display:grid;grid-template-columns:1fr 1fr;gap:10px;}
  .row3{display:grid;grid-template-columns:1fr 1fr 1fr;gap:8px;}

  .btn{appearance:none;border:none;cursor:pointer;font-family:var(--sans);font-weight:600;font-size:14.5px;
    padding:13px 16px;border-radius:13px;background:var(--brand);color:#FFFFFF;width:100%;}
  .btn:active{transform:scale(.98);}
  .btn:disabled{opacity:.45;cursor:default;}
  .btn.sec{background:transparent;color:var(--brand-soft);border:1px solid rgba(255,107,71,.4);}
  .btn.sage{background:var(--calma);color:#FFFFFF;}
  .btn.sm{padding:9px 13px;font-size:12.5px;width:auto;border-radius:10px;}
  .btn.ghost{background:var(--card-2);color:var(--muted);}

  /* Pills / selector */
  .seg{display:flex;gap:7px;flex-wrap:wrap;}
  .seg button{flex:1;min-width:fit-content;padding:11px 8px;border-radius:11px;border:1px solid var(--line);background:var(--card-2);
    font-family:var(--sans);font-weight:600;font-size:13px;color:var(--muted);cursor:pointer;}
  .seg button.on{background:var(--brand);color:#FFFFFF;border-color:var(--brand);}
  .seg.sage button.on{background:var(--calma);border-color:var(--calma);color:#FFFFFF;}

  /* Ingredient chips */
  .ing-add{display:flex;gap:8px;align-items:flex-end;}
  .ing-add .grow{flex:1;}
  .ing-add .g{width:84px;}
  .chips{display:flex;flex-wrap:wrap;gap:8px;margin-top:4px;}
  .ing{display:flex;align-items:center;gap:9px;background:var(--card-2);border:1px solid var(--line);border-radius:13px;padding:8px 10px;}
  .ing .em{font-size:20px;}
  .ing .nm{font-weight:600;font-size:13.5px;line-height:1.15;color:var(--ink);}
  .ing .mc{font-family:var(--mono);font-size:10.5px;color:var(--quiet);font-weight:500;letter-spacing:.2px;margin-top:2px;}
  .ing .x{margin-left:2px;width:22px;height:22px;border-radius:7px;background:rgba(36,24,35,.05);border:none;cursor:pointer;color:var(--muted);font-weight:700;font-size:14px;line-height:1;}
  .ing .tag{font-family:var(--mono);font-size:8px;font-weight:500;padding:2px 5px;border-radius:5px;background:rgba(110,181,217,.14);color:var(--calma);text-transform:uppercase;letter-spacing:.5px;}
  .quick{display:flex;flex-wrap:wrap;gap:7px;}
  .quick button{border:1px dashed var(--line);background:transparent;border-radius:10px;padding:7px 10px;font-family:var(--sans);font-weight:500;font-size:12.5px;cursor:pointer;color:var(--muted);}
  .quick button:active{background:rgba(255,107,71,.1);border-color:var(--brand);}

  /* Recipe */
  .recipe{border:1px solid var(--line);border-radius:15px;overflow:hidden;margin-bottom:12px;background:var(--card);}
  .recipe-head{padding:14px 15px;display:flex;justify-content:space-between;align-items:flex-start;gap:10px;cursor:pointer;}
  .recipe-head .meal{font-family:var(--mono);font-size:9px;font-weight:500;color:var(--brand);text-transform:uppercase;letter-spacing:1.6px;}
  .recipe-head .ttl{font-family:var(--serif);font-weight:400;font-size:18px;margin-top:5px;line-height:1.15;letter-spacing:-.3px;color:var(--ink);}
  .recipe-meta{display:flex;gap:8px;margin-top:9px;flex-wrap:wrap;}
  .meta-pill{font-family:var(--mono);font-size:10px;font-weight:500;letter-spacing:.4px;color:var(--quiet);background:var(--card-2);padding:4px 8px;border-radius:7px;text-transform:uppercase;}
  .recipe-body{padding:0 15px 16px;border-top:1px solid var(--line);}
  .recipe-body h5{margin:14px 0 7px;font-family:var(--mono);font-size:9.5px;text-transform:uppercase;letter-spacing:1px;color:var(--quiet);font-weight:600;}
  .recipe-body ul,.recipe-body ol{margin:0;padding-left:18px;}
  .recipe-body li{font-size:13.5px;font-weight:400;line-height:1.65;margin-bottom:3px;color:var(--muted);}
  .recipe-body li::marker{color:var(--brand);}
  .tags{display:flex;flex-wrap:wrap;gap:6px;margin-top:10px;}
  .ttag{font-family:var(--mono);font-size:9px;font-weight:600;padding:3px 7px;border-radius:5px;background:rgba(110,181,217,.16);color:var(--calma);text-transform:uppercase;letter-spacing:.5px;}

  /* Shopping */
  .shop-group{margin-bottom:18px;}
  .shop-group .gh{font-family:var(--serif);font-weight:400;font-size:16px;margin:0 0 9px;display:flex;align-items:center;gap:8px;color:var(--brand-soft);}
  .shop-item{display:flex;align-items:center;gap:11px;padding:11px 13px;background:var(--card);border:1px solid var(--line);border-radius:12px;margin-bottom:7px;cursor:pointer;}
  .shop-item .box{width:22px;height:22px;border-radius:7px;border:1.5px solid var(--line);flex:none;display:grid;place-items:center;font-size:13px;color:#FFFFFF;}
  .shop-item.done .box{background:var(--calma);border-color:var(--calma);}
  .shop-item.done .nm{text-decoration:line-through;color:var(--quiet);}
  .shop-item .nm{font-weight:500;font-size:14px;flex:1;color:var(--ink);}
  .shop-item .qt{font-family:var(--mono);font-size:11px;color:var(--quiet);font-weight:400;letter-spacing:.3px;}

  /* History */
  .hist{display:flex;flex-direction:column;gap:9px;}
  .hday{background:var(--card);border:1px solid var(--line);border-left:3px solid var(--brand);border-radius:14px;padding:13px 14px 13px 15px;}
  .hday-top{display:flex;justify-content:space-between;align-items:center;}
  .hday .date{font-family:var(--serif);font-weight:400;font-size:15px;text-transform:capitalize;color:var(--brand-soft);}
  .hday .small{font-family:var(--mono);font-size:9.5px;color:var(--quiet);font-weight:500;text-transform:uppercase;letter-spacing:.5px;}
  .hbars{display:flex;gap:10px;margin-top:11px;}
  .hbar{flex:1;}
  .hbar .l{font-family:var(--mono);font-size:9px;font-weight:600;color:var(--quiet);text-transform:uppercase;letter-spacing:.4px;margin-bottom:4px;display:flex;justify-content:space-between;}
  .hbar .t{height:6px;border-radius:99px;background:rgba(36,24,35,.08);overflow:hidden;}
  .hbar .t > i{display:block;height:100%;border-radius:99px;}

  /* Tab bar */
  .tabbar{position:fixed;bottom:0;left:50%;transform:translateX(-50%);width:100%;max-width:520px;
    background:rgba(255,247,237,.92);backdrop-filter:blur(12px);border-top:1px solid var(--line);
    display:flex;padding:9px 6px calc(9px + env(safe-area-inset-bottom));z-index:30;}
  .tab{flex:1;background:none;border:none;cursor:pointer;font-family:var(--mono);display:flex;flex-direction:column;
    align-items:center;gap:4px;padding:6px 2px;color:var(--quiet);font-weight:600;font-size:9px;text-transform:uppercase;letter-spacing:.6px;}
  .tab .ic{font-size:20px;line-height:1;filter:grayscale(.5);opacity:.5;}
  .tab.on{color:var(--brand-soft);}
  .tab.on .ic{filter:none;opacity:1;transform:translateY(-1px);}

  .empty{text-align:center;color:var(--muted);font-family:var(--serif);font-style:italic;font-weight:400;padding:30px 18px;font-size:15px;line-height:1.7;}
  .empty .em{font-size:34px;display:block;margin-bottom:10px;font-style:normal;}
  .banner{background:linear-gradient(135deg,rgba(255,107,71,.14),rgba(255,107,71,.04));border:1px solid rgba(255,107,71,.22);border-radius:14px;padding:13px 14px;display:flex;gap:11px;align-items:center;margin-bottom:16px;}
  .banner .em{font-size:22px;}
  .banner .tx{font-size:13px;font-weight:400;line-height:1.45;color:var(--ink);}
  .banner button{margin-left:auto;}
  .disclaimer{font-size:11px;color:var(--faint);font-weight:400;line-height:1.6;text-align:center;padding:8px 14px 16px;}
  .switch{display:flex;align-items:center;justify-content:space-between;padding:13px 0;border-top:1px solid var(--line);}
  .switch:first-of-type{border-top:none;}
  .switch .tx{font-weight:600;font-size:14px;color:var(--ink);}
  .switch .tx small{display:block;font-weight:400;color:var(--quiet);font-size:11.5px;margin-top:2px;}
  .toggle{width:48px;height:28px;border-radius:99px;background:#E7D9C6;border:1px solid var(--line);position:relative;cursor:pointer;flex:none;transition:background .2s;}
  .toggle.on{background:var(--calma);border-color:var(--calma);}
  .toggle b{position:absolute;top:3px;left:3px;width:21px;height:21px;border-radius:50%;background:#FFFFFF;box-shadow:0 1px 3px rgba(36,24,35,.25);transition:left .2s;}
  .toggle.on b{left:23px;background:#fff;}
  .divider{height:1px;background:var(--line);margin:14px 0;}
  .save-toast{position:fixed;bottom:104px;left:50%;transform:translateX(-50%);background:var(--ink);color:#FFF4E6;padding:11px 20px;border-radius:99px;font-weight:600;font-size:13px;z-index:50;box-shadow:0 10px 30px -10px rgba(36,24,35,.4);}

  /* ===== Proteína protagonista ===== */
  .prot-hero{background:linear-gradient(135deg,rgba(224,85,46,.12),rgba(224,85,46,.035));border:1px solid rgba(224,85,46,.28);border-radius:15px;padding:14px 16px;margin-bottom:15px;}
  .ph-top{display:flex;justify-content:space-between;align-items:baseline;gap:10px;}
  .ph-label{font-family:var(--mono);font-size:10.5px;font-weight:700;text-transform:uppercase;letter-spacing:.9px;color:var(--brand-soft);display:flex;align-items:center;gap:6px;}
  .ph-val{font-family:var(--serif);font-size:14px;color:var(--muted);white-space:nowrap;}
  .ph-val b{font-family:var(--serif);font-style:italic;font-size:32px;font-weight:400;color:var(--ink);letter-spacing:-1.2px;}
  .ph-bar{height:12px;border-radius:99px;background:rgba(36,24,35,.07);overflow:hidden;margin:10px 0 9px;}
  .ph-bar > i{display:block;height:100%;border-radius:99px;background:linear-gradient(90deg,var(--prot),#F0875A);transition:width .55s ease;}
  .ph-note{font-size:12px;color:var(--muted);line-height:1.45;}
  .ph-note b{color:var(--brand-soft);font-weight:700;}

  .pbadge{display:inline-flex;align-items:center;gap:3px;background:var(--prot);color:#fff;font-family:var(--mono);font-size:10px;font-weight:700;padding:2px 7px;border-radius:6px;letter-spacing:.2px;}
  .pdens{font-family:var(--mono);font-size:8px;font-weight:700;text-transform:uppercase;letter-spacing:.5px;padding:2px 5px;border-radius:5px;margin-left:5px;}
  .pdens.alta{background:rgba(224,85,46,.14);color:var(--brand-soft);}
  .pdens.media{background:rgba(217,154,63,.18);color:var(--gold);}
  .pdens.baja{background:rgba(36,24,35,.05);color:var(--quiet);}
  .meta-pill.prot{background:var(--prot);color:#fff;font-weight:700;}

  /* ===== Despensa (chips) ===== */
  .pchip{display:inline-flex;align-items:center;gap:7px;background:var(--card-2);border:1px solid var(--line);border-radius:11px;padding:7px 9px;font-size:13px;font-weight:500;color:var(--ink);}
  .pchip .em{font-size:16px;}
  .pchip .x{margin-left:1px;width:19px;height:19px;border-radius:6px;background:rgba(36,24,35,.05);border:none;cursor:pointer;color:var(--muted);font-weight:700;font-size:13px;line-height:1;}

  /* ===== Compra mejorada ===== */
  .compra-head{display:flex;align-items:center;justify-content:space-between;gap:10px;margin-bottom:14px;}
  .shop-item .si-main{flex:1;display:flex;flex-direction:column;gap:2px;cursor:pointer;min-width:0;}
  .shop-item .si-sub{font-family:var(--mono);font-size:9.5px;color:var(--quiet);letter-spacing:.2px;}
  .shop-item .qt{font-family:var(--mono);font-size:12px;color:var(--brand-soft);font-weight:700;letter-spacing:.2px;white-space:nowrap;}
  .shop-item.done .qt{color:var(--quiet);font-weight:400;}
  .si-have{flex:none;width:34px;height:34px;border-radius:9px;border:1px solid var(--line);background:var(--card-2);cursor:pointer;font-size:15px;line-height:1;color:var(--muted);}
  .si-have:active{transform:scale(.92);}
  .add-row{display:flex;gap:8px;align-items:center;margin:4px 0 2px;}
  .add-row .grow{flex:1;}

  /* ===== Lo que te falta hoy ===== */
  .falta{margin-top:12px;padding:12px 13px;background:rgba(224,85,46,.06);border:1px solid rgba(224,85,46,.18);border-radius:12px;}
  .falta-line{font-size:12.5px;color:var(--muted);line-height:1.5;font-weight:500;}
  .falta-line b{color:var(--brand-soft);font-weight:700;}
  .falta .quick button{border-color:rgba(224,85,46,.4);}
  .falta .quick button .plus{font-family:var(--mono);font-size:10px;font-weight:700;color:var(--brand-soft);margin-left:2px;}
  .falta-kcal{font-size:12px;color:var(--muted);line-height:1.45;margin-top:11px;}
  .falta-kcal b{color:var(--ink);font-weight:700;}
  .quick .plus{font-family:var(--mono);font-size:10px;font-weight:700;color:var(--brand-soft);margin-left:2px;}
  .quick.sug button{border-style:solid;border-color:rgba(214,81,43,.4);}
  .encasa{margin-left:4px;font-size:11px;}
  .techos{font-size:12.5px;color:var(--muted);line-height:1.5;margin-top:12px;padding-top:11px;border-top:1px solid var(--line);}
  .techos b{color:var(--ink);font-weight:700;}
  .warn{margin-top:11px;padding:10px 12px;background:rgba(178,62,30,.08);border:1px solid rgba(178,62,30,.28);border-radius:11px;font-size:12px;color:var(--brand-d);font-weight:600;line-height:1.45;}

  /* ===== Glow-up visual ===== */
  .app::before{content:"";position:absolute;top:0;left:0;right:0;height:440px;pointer-events:none;z-index:0;
    background:radial-gradient(120% 90% at 50% -22%, rgba(255,107,71,.12), rgba(47,132,114,.05) 46%, transparent 72%);}
  .content{position:relative;z-index:1;}
  .tagline{font-family:var(--serif);font-style:italic;font-size:13px;color:var(--muted);margin-top:6px;line-height:1.4;}
  .hero{margin:6px 0 22px;}
  .hero-eyebrow{font-family:var(--mono);font-size:11px;letter-spacing:1.2px;text-transform:uppercase;color:var(--muted);margin-bottom:11px;font-weight:600;}
  .hero-hi{font-family:var(--serif);font-style:italic;font-weight:300;font-size:40px;line-height:1.0;letter-spacing:-1.8px;color:var(--brand-soft);margin:0;}
  .hero-hi i{color:var(--ink);font-style:italic;}
  .tip{margin-top:13px;padding:12px 13px;background:rgba(110,181,217,.08);border:1px solid rgba(110,181,217,.18);border-radius:12px;font-size:12.5px;color:var(--muted);line-height:1.6;font-weight:400;}
  .tip b{color:var(--brand-soft);font-weight:600;}
  .recipe-strip{height:3px;width:100%;}
  .kcal-ring .big b{font-size:32px;}

  /* ===== Orbes ambientales flotantes (decorativos, detrás de todo) ===== */
  .orbs{position:fixed;inset:0;z-index:0;pointer-events:none;overflow:hidden;}
  .orbs i{position:absolute;display:block;border-radius:50%;filter:blur(42px);opacity:.12;will-change:transform;transform:translateZ(0);}
  .orbs i:nth-child(1){width:240px;height:240px;top:-60px;left:-70px;
    background:radial-gradient(circle,rgba(255,107,71,.5),transparent 66%);animation:drift1 34s ease-in-out infinite;}
  .orbs i:nth-child(2){width:220px;height:220px;top:44%;right:-100px;
    background:radial-gradient(circle,rgba(110,181,217,.4),transparent 66%);animation:drift2 40s ease-in-out infinite;}
  .orbs i:nth-child(3){display:none;}
  @keyframes drift1{0%,100%{transform:translate(0,0)}50%{transform:translate(34px,28px)}}
  @keyframes drift2{0%,100%{transform:translate(0,0)}50%{transform:translate(-28px,-34px)}}
  /* En móviles pequeños, los orbes se quedan quietos para no gastar GPU/batería */
  @media (max-width:480px){.orbs i{animation:none;}}
  @media (prefers-reduced-motion:reduce){.orbs i{animation:none;}}

  /* ===== Resumen del día (objetivo ↔ menú) ===== */
  .daysum{background:linear-gradient(135deg,rgba(47,132,114,.10),rgba(47,132,114,.03));border-color:rgba(47,132,114,.26);}
  .daysum.warn-c{background:linear-gradient(135deg,rgba(178,62,30,.09),rgba(178,62,30,.03));border-color:rgba(178,62,30,.28);}
  .dm-grid{display:flex;flex-direction:column;gap:13px;}
  .dm-row .mrow-top{margin-bottom:5px;}
  .dm-prot .mrow-top span:first-child{color:var(--brand-soft);font-weight:700;}
  .dm-verdict{margin-top:14px;padding:11px 13px;border-radius:11px;font-size:13px;font-weight:600;line-height:1.45;display:flex;gap:8px;align-items:flex-start;}
  .dm-verdict.ok{background:rgba(47,132,114,.12);color:var(--calma);}
  .dm-verdict.no{background:rgba(178,62,30,.09);color:var(--brand-d);}
  .dm-verdict .em{font-size:16px;flex:none;}
  .ring-hero{display:flex;align-items:center;gap:16px;}
  .ring-big{position:relative;width:140px;height:140px;flex:none;}
  .ring-big .ring-c{position:absolute;inset:0;display:grid;place-items:center;text-align:center;}
  .ring-big .ring-c b{display:block;font-family:var(--serif);font-style:italic;font-weight:400;font-size:46px;line-height:.85;color:var(--ink);}
  .ring-big .ring-c span{font-family:var(--mono);font-size:9px;font-weight:600;color:var(--muted);text-transform:uppercase;letter-spacing:.4px;line-height:1.35;display:block;margin-top:5px;}
  .ring-side{flex:1;display:flex;flex-direction:column;gap:12px;min-width:0;}
  .ring-side .mrow-top{font-size:12px;}
  .ring-side .mrow-top .v{font-size:9.5px;letter-spacing:0;}
  @media(max-width:359px){.ring-hero{flex-direction:column;}}

  /* ===== Portada visual de receta (héroe de emoji, sin imágenes pesadas) ===== */
  .recipe-cover{position:relative;height:74px;display:flex;align-items:center;gap:13px;padding:0 16px;overflow:hidden;cursor:pointer;}
  .recipe-cover .rc-emoji{font-size:38px;line-height:1;filter:drop-shadow(0 2px 5px rgba(36,24,35,.18));}
  .recipe-cover .rc-meal{font-family:var(--mono);font-size:9.5px;font-weight:700;text-transform:uppercase;letter-spacing:1.6px;color:#fff;opacity:.95;}
  .recipe-cover .rc-ttl{font-family:var(--serif);font-weight:500;font-size:16.5px;line-height:1.12;letter-spacing:-.3px;color:#fff;margin-top:3px;
    display:-webkit-box;-webkit-line-clamp:2;-webkit-box-orient:vertical;overflow:hidden;}
  .recipe-cover .rc-chev{position:absolute;right:13px;top:11px;color:#fff;opacity:.85;font-size:16px;}
  .recipe-cover .rc-text{min-width:0;flex:1;}
  .recipe-meta2{display:flex;gap:7px;flex-wrap:wrap;padding:11px 15px 0;}
  .meal-block{margin-bottom:13px;}
  .meal-bar{display:flex;align-items:center;gap:10px;margin:0 0 7px;}
  .meal-bar .mb-label{font-family:var(--mono);font-size:10px;font-weight:700;text-transform:uppercase;letter-spacing:1.2px;color:var(--quiet);}
  .meal-bar .mb-line{flex:1;height:1px;background:var(--line);}
  .swap-btn{flex:none;border:1px solid var(--line);background:var(--card-2);border-radius:9px;padding:5px 10px;cursor:pointer;
    font-family:var(--mono);font-size:9.5px;font-weight:700;text-transform:uppercase;letter-spacing:.6px;color:var(--brand-soft);}
  .swap-btn:active{transform:scale(.95);}

function unidadCompra(nombre, g, cat){
  if(!g || g<=0) return {main:"", sub:""};
  const plural = (lbl,n)=> n<=1 ? lbl : (lbl==="ud" ? "uds" : lbl+"s");
  const pieza = PIEZA[nombre];
  if(pieza){ const n=Math.max(1,Math.round(g/pieza)); return {main:n+" "+plural("ud",n), sub:"≈ "+g+" g"}; }
  const pk = PACK[nombre];
  if(pk){ const n=Math.max(1,Math.ceil(g/pk[1])); return {main:n+" "+plural(pk[0],n), sub:"≈ "+g+" g"}; }
  if(cat==="carne"||cat==="pescado"){ const r=Math.max(1,Math.round(g/130)); return {main:g+" g", sub:"≈ "+r+(r===1?" ración":" raciones")}; }
  const cp = CAT_PACK[cat];
  if(cp){ const n=Math.max(1,Math.ceil(g/cp[1])); return {main:n+" "+plural(cp[0],n), sub:"≈ "+g+" g"}; }
  return {main:g+" g", sub:""};
}

/* PLANES (enfoque: CÓMO comes) — definen las macros y qué alimentos entran */
/* 3 enfoques claros y SIN solaparse. maxRecipeCarb = tope de carbohidratos POR RECETA
   (coherencia: nunca sale pasta/arroz/pan donde no toca). La dieta antiinflamatoria es
   un TOGGLE del perfil (profile.antiinflamatoria), no un plan. */
const PLANS = {
  lowcarb: {label:"Baja en carbohidratos", em:"🥗", protPerKg:1.8, fatPerKg:0, carbMode:"lowcarb", carbCap:100, maxRecipeCarb:45, exclude:[],

            tagline:"Cetogénica", nota:"Muy pocos carbohidratos y más grasa saludable. Nada de pan, pasta, arroz, legumbre ni azúcar."},
  paleo:   {label:"Paleo", em:"🍖", protPerKg:1.8, fatPerKg:1.1, carbMode:"balance", carbCap:130, maxRecipeCarb:55, exclude:["legumbre","lacteo","cereal"],
            tagline:"Paleo · comida real", nota:"Sin cereales, legumbres ni lácteos: carne, pescado, huevo, verdura, fruta y frutos secos."},
};
/* OBJETIVO (para QUÉ) — solo ajusta las calorías */
const GOALS = {
  adelgazar:    {label:"Adelgazar", em:"🔥", kcalFactor:0.80, nota:"Déficit moderado."},
  mantenimiento:{label:"Mantenimiento", em:"⚖️", kcalFactor:1.0, nota:"Sostener tu peso y energía."},
  ganar:        {label:"Ganar músculo", em:"📈", kcalFactor:1.10, nota:"Ligero superávit para construir músculo."},
};
const ACTIVITY = {sedentaria:1.2, ligera:1.375, moderada:1.55, activa:1.725};
/* antiinflamatoria = toggle del perfil (profile.antiinflamatoria), no un plan */
/* Normaliza perfiles antiguos (objetivo viejo inflamacion/adelgazar/mantenimiento + toggle vegetariana) */
function normProfile(p){
  p = {...p};
  // antiinflamatoria es ahora un toggle (capa sobre cualquier plan); migra planes viejos
  if(typeof p.antiinflamatoria !== "boolean") p.antiinflamatoria = (p.plan==="antiinflamatoria"||p.plan==="mediterranea") ? true : (p.antiinflamatoria!==false);
  if(!PLANS[p.plan]) p.plan = (p.plan==="paleo") ? "paleo" : (p.plan==="keto") ? "keto" : "lowcarb";
  if(p.objetivo==="inflamacion") p.objetivo = "mantenimiento";
  if(!GOALS[p.objetivo]) p.objetivo = "adelgazar";
  if(p.sexo!=="mujer" && p.sexo!=="hombre") p.sexo = p.sexo || "";     // vacío hasta el onboarding
  if(typeof p.snack !== "boolean") p.snack = false;                    // incluir merienda
  delete p.personas;                                                   // comensales eliminado (app personal)
  return p;
}
/* Filtro central de alimentos: plan + alergias/preferencias */
function foodOk(f, profile){
  if(!f) return false;
  const plan = PLANS[profile.plan]||PLANS.lowcarb;
  if(plan.exclude.includes(f.cat)) return false;
  if(profile.sinLactosa && f.cat==='lacteo') return false;
  if(profile.sinGluten && GLUTEN.has(f.nombre)) return false;
  if(profile.sinFrutosSecos && FRUTOSSECOS.has(f.nombre)) return false;
  if(profile.sinHuevo && f.cat==='huevo') return false;
  return true;
}

function calcTargets(profile){
  profile = normProfile(profile);
  const peso = +profile.peso||68, altura = +profile.altura||165, edad = +profile.edad||51;
  const bmr = 10*peso + 6.25*altura - 5*edad + (profile.sexo==='hombre' ? 5 : -161); // Mifflin-St Jeor (mujer/hombre)
  const tdee = bmr * (ACTIVITY[profile.actividad]||1.375);
  const plan = PLANS[profile.plan]||PLANS.lowcarb;
  const goal = GOALS[profile.objetivo]||GOALS.mantenimiento;
  const kcal = Math.round(tdee*goal.kcalFactor);
  const prot = Math.round(peso*plan.protPerKg);
  let fat, carbs;
  if(plan.carbMode==="keto" || plan.carbMode==="lowcarb"){
    carbs = plan.carbCap||30;                                  // tope de carbohidratos (keto 30 g · baja en carbos 100 g)
    fat   = Math.max(0, Math.round((kcal - prot*4 - carbs*4)/9));
  } else {
    fat   = Math.round(peso*plan.fatPerKg);
    carbs = Math.max(0, Math.round((kcal - prot*4 - fat*9)/4));
  }
  return {kcal, prot, fat, carbs, tdee:Math.round(tdee), bmr:Math.round(bmr), carbMode:plan.carbMode};
}
function sumMacros(items){
  return items.reduce((a,it)=>{
    const f = getFood(it.nombre); const g = +it.g||0;
    if(f){ a.prot+=f.prot*g/100; a.fat+=f.fat*g/100; a.kcal+=f.kcal*g/100; }
    return a;
  },{prot:0,fat:0,kcal:0});
}
function recipeMacros(r){
  return sumMacros(r.ingredientes);
}

    ["antiinflamatorio","veg"]),
  R("s8","merienda","Kéfir con semillas de chía",5,
    [["Kéfir",200],["Semillas de chía",10]],
    ["Mezcla el kéfir con las semillas de chía.","Deja reposar 5 min antes de tomar."],
    ["calcio","omega3","veg"]),

    [["Edamame",100]],
    ["Cuece el edamame al vapor 5 min.","Escúrrelo y añade una pizca de sal."],
    ["fitoestrogenos","fibra","veg","sinLactosa"]),
  R("s10","merienda","Tortitas de arroz con mantequilla de cacahuete",4,
    [["Tortitas de arroz",30],["Mantequilla de cacahuete",20]],

    [["Queso curado",30],["Nueces",20]],

RECIPES.forEach(r=>{ r.ing = r.ingredientes.map(([n,g])=>({nombre:n,g})); r.macros = recipeMacros({ingredientes:r.ing}); });

/* ============================================================
   GENERADOR DE MENÚ SEMANAL
   ============================================================ */
function mulberry32(seed){ return function(){ let t=seed+=0x6D2B79F5; t=Math.imul(t^t>>>15,t|1); t^=t+Math.imul(t^t>>>7,t|61); return ((t^t>>>14)>>>0)/4294967296; }; }
const DIAS_SEM = ["Lunes","Martes","Miércoles","Jueves","Viernes","Sábado","Domingo"];

const recipeCarbs = r => Math.max(0, (r.macros.kcal - r.macros.prot*4 - r.macros.fat*9)/4);
function recipeAllowed(r, profile){
  const plan = PLANS[profile.plan]||PLANS.lowcarb;
  if(r.ing.some(it=>{ const f=getFood(it.nombre); return f && !foodOk(f, profile); })) return false;
  // COHERENCIA: ninguna receta puede pasar del tope de carbos del plan (nada de pasta/arroz/pan en keto, etc.)
  if(recipeCarbs(r) > (plan.maxRecipeCarb || 60)) return false;
  return true;
}
function scoreRecipe(r, despensaSet, profile, rnd){
  const plan = PLANS[profile.plan]||PLANS.lowcarb;
  let s = rnd*1.5;
  r.ing.forEach(it=>{ if(despensaSet.has(it.nombre.toLowerCase())) s+=3; });   // usa lo que hay en casa
  if(profile.antiinflamatoria){ let ai=0; r.tags.forEach(t=>{ if(["antiinflamatorio","omega3","fitoestrogenos","fibra"].includes(t)) ai+=1; }); s+=Math.min(2.5,ai); }   // suave, para no llenar todo de pescado
  // densidad de proteína (g por 100 kcal): clave para que el menú llegue a la meta de proteína
  const dens = r.macros.kcal>0 ? r.macros.prot/r.macros.kcal*100 : 0;
  s += Math.min(4, dens/2);
  if(profile.objetivo==="adelgazar"){ if(r.macros.kcal<420) s+=2; if(r.macros.kcal>620) s-=2; }
  if(plan.carbMode==="keto"){ const c=recipeCarbs(r); s += c<=15 ? 3 : -(c/8); }
  if(plan.carbMode==="lowcarb"){ const c=recipeCarbs(r); s += c<=25 ? 2 : 0; }
  return s;
}
const MEAL_KEYS  = ["desayuno","comida","merienda","cena"];
const MEAL_LABEL = {desayuno:"Desayuno",comida:"Comida",merienda:"Merienda",cena:"Cena"};

/* Categoría del ingrediente PRINCIPAL de una receta (el de más proteína).
   carne / pescado / legumbre, o "verdura" si es vegetariana (huevo/vegetal). */
function recipeMainCat(r){
  let best=null, bestP=-1;
  r.ing.forEach(it=>{ const f=getFood(it.nombre); if(f && ["carne","pescado","huevo","legumbre"].includes(f.cat)){ const p=f.prot*it.g/100; if(p>bestP){ bestP=p; best=f.cat; } } });
  return (best==="carne"||best==="pescado"||best==="legumbre") ? best : "verdura";
}
const MAIN_CATS = [["carne","🥩","Carne"],["pescado","🐟","Pescado"],["legumbre","🫘","Legumbre"],["verdura","🥗","Verdura"]];
function recipeMatchesMain(r, mainCat){
  if(!mainCat) return true;
  if(mainCat==="verdura") return recipeMainCat(r)==="verdura" || r.tags.includes("veg");
  return recipeMainCat(r)===mainCat;
}
/* Nombre del ingrediente PRINCIPAL (el de más proteína animal/legumbre) */
function recipeMainIng(r){
  let best=null,bestP=-1;
  r.ing.forEach(it=>{ const f=getFood(it.nombre); if(f && ["carne","pescado","huevo","legumbre"].includes(f.cat)){ const p=f.prot*it.g/100; if(p>bestP){ bestP=p; best=it.nombre; } } });
  return best;
}

/* Tope de carbos DIARIO: si el día (keto/low-carb) se pasa del tope, sustituye
   el plato de más carbos por la opción de menos carbos de su mismo turno. */
function capCarbsDay(day, pools, cap){
  const cOf = id => { const r=recipeById(id); return r?recipeCarbs(r):0; };
  const slots = ["desayuno","comida","cena"].filter(k=>day[k]);
  if(day.merienda) slots.push("merienda");
  let guard=0;
  while(guard++ < 8){
    const sum = slots.reduce((s,k)=>s+cOf(day[k]),0);
    if(sum <= cap) break;
    let worstK=null, worstC=-1;
    slots.forEach(k=>{ const c=cOf(day[k]); if(c>worstC){ worstC=c; worstK=k; } });
    const pool = pools[worstK]||[];
    const better = [...pool].sort((a,b)=>recipeCarbs(a)-recipeCarbs(b))
                            .find(r=>r.id!==day[worstK] && recipeCarbs(r)<worstC);
    if(!better) break;
    day = {...day, [worstK]:better.id};
  }
  return day;
}

/* Sube la proteína DIARIA: como las raciones se escalan a las kcal objetivo,
   la proteína del día ≈ kcal_objetivo × (proteína/kcal del día). Si se queda
   corta, sustituye la comida principal de MENOR densidad proteica por una más
   densa de su mismo turno. (Sinergia con keto: lo denso suele ser bajo en carbos.) */
function boostProteinDay(day, pools, profile){
  const t = calcTargets(profile);
  const dens = id => { const r=recipeById(id); return (r&&r.macros.kcal>0) ? r.macros.prot/r.macros.kcal : 0; };
  const proj = ()=>{ let p=0,k=0; ["desayuno","comida","cena","merienda"].forEach(key=>{ if(!day[key])return;
      const r=recipeById(day[key]); if(r){ p+=r.macros.prot; k+=r.macros.kcal; } }); return k>0 ? t.kcal*p/k : 0; };
  let guard=0;
  while(guard++ < 6 && proj() < t.prot*0.92){
    const slots = ["desayuno","comida","cena"].filter(k=>day[k]);
    let lowK=null, lowD=1e9;
    slots.forEach(k=>{ const d=dens(day[k]); if(d<lowD){ lowD=d; lowK=k; } });
    const pool = pools[lowK]||[];
    const better = [...pool].sort((a,b)=>(b.macros.prot/Math.max(1,b.macros.kcal))-(a.macros.prot/Math.max(1,a.macros.kcal)))
                            .find(r=>r.id!==day[lowK] && (r.macros.prot/Math.max(1,r.macros.kcal))>lowD);
    if(!better) break;
    day = {...day, [lowK]:better.id};
  }
  return day;
}

/* Evita que comida y cena sean de la misma categoría (p.ej. dos pescados) */
function diversifyDay(day, pools){
  const mc = id => { const r=recipeById(id); return r?recipeMainCat(r):null; };
  if(day.comida && day.cena && mc(day.comida)===mc(day.cena)){
    const want = mc(day.comida);
    const alt = (pools.cena||[]).find(r=> recipeMainCat(r)!==want && r.id!==day.cena);
    if(alt) day = {...day, cena:alt.id};
  }
  return day;
}
/* Plan de UN día (desayuno/comida/cena[/merienda]) coherente y cuadrado al objetivo.
   Elige el día de la semana generada con MÁS proteína (para cumplir la meta); la variedad
   viene de la semilla aleatoria en cada "otro plan". */
function genDay(profile, despensa, seed){
  const sd = (seed>>>0) || Math.floor(Math.random()*1e9);
  const week = genMenu(profile, despensa, sd);
  let best=week[0], bestP=-1;
  week.forEach(d=>{ const p=dayTotals(profile,d).prot; if(p>bestP){ bestP=p; best=d; } });
  const out = {desayuno:best.desayuno, comida:best.comida, cena:best.cena};
  if(best.merienda) out.merienda = best.merienda;
  return out;
}

function genMenu(profile, despensa, seed){
  profile = normProfile(profile);
  const rnd = mulberry32(seed||1);
  const set = new Set((despensa||[]).map(i=>i.nombre.toLowerCase()));
  const plan = PLANS[profile.plan]||PLANS.lowcarb;
  const useSnack = !!profile.snack;
  const cap = (plan.carbMode==="keto"||plan.carbMode==="lowcarb") ? (plan.carbCap||30) : null;

  const rank = (tipo)=>{
    let pool = RECIPES.filter(r=>r.tipo===tipo && recipeAllowed(r,profile));
    if(pool.length===0) pool = RECIPES.filter(r=>r.tipo===tipo);   // último recurso si el plan no tiene recetas
    return pool.map(r=>({r, sc:scoreRecipe(r,set,profile,rnd())})).sort((a,b)=>b.sc-a.sc).map(o=>o.r);
  };
  const pools = {desayuno:rank("desayuno"), comida:rank("comida"), cena:rank("cena"), merienda:useSnack?rank("merienda"):[]};
  // reparte las 7 elecciones por TODO el recetario de cada turno (más variedad)
  const seq = (pool)=>{ if(!pool.length) return ()=>null;
    const step=Math.max(1,Math.floor(pool.length/7)), off=Math.floor(rnd()*pool.length);
    return (i)=> pool[(off+i*step)%pool.length]; };
  const sD=seq(pools.desayuno), sC=seq(pools.comida), sN=seq(pools.cena), sM=seq(pools.merienda);

  return DIAS_SEM.map((dia,i)=>{
    let day = {dia, desayuno:sD(i)?.id, comida:sC(i)?.id, cena:sN(i)?.id};
    if(useSnack && sM(i)) day.merienda = sM(i).id;
    day = boostProteinDay(day, pools, profile);
    day = diversifyDay(day, pools);
    if(cap) day = capCarbsDay(day, pools, cap);
    return day;
  });
}
const recipeById = id => RECIPES.find(r=>r.id===id);

/* ============================================================
   ESCALADO DE RACIONES + RESUMEN DEL DÍA
   Las recetas tienen gramos "base". Para que el menú cumpla DE VERDAD
   las metas de la persona, escalamos cada día con un único factor
   (kcal del menú → kcal objetivo), con límites sensatos. Proteína y
   carbohidratos escalan en proporción. La compra usa estos gramos
   ya escalados (× nº de personas).
   ============================================================ */
const dayMealIds   = d => MEAL_KEYS.map(k=>d&&d[k]).filter(Boolean);
const dayRecipesRaw= d => dayMealIds(d).map(recipeById).filter(Boolean);
/* Factor de escala del día: acerca las kcal del menú a la meta (tope 0.6–1.8) */
function dayScale(profile, d){
  const t = calcTargets(profile);
  const base = dayRecipesRaw(d).reduce((s,r)=>s+r.macros.kcal,0);
  if(base<=0) return 1;
  return Math.min(1.8, Math.max(0.6, t.kcal/base));
}
/* Receta con gramos escalados (redondeo a 5 g, mínimo 5) y macros recalculadas */
function scaleRecipe(r, factor){
  if(!r) return r;
  if(Math.abs(factor-1) < 0.04) return {...r, escala:1};
  const ing = r.ing.map(it=>({nombre:it.nombre, g: Math.max(5, Math.round(it.g*factor/5)*5)}));
  return {...r, ing, macros:sumMacros(ing), escala:factor};
}
const scaledDayRecipes = (profile, d) => { const f=dayScale(profile,d); return dayRecipesRaw(d).map(r=>scaleRecipe(r,f)); };
/* Totales del día sobre recetas ya escaladas (incluye carbohidratos) */
function dayTotals(profile, d){
  return scaledDayRecipes(profile, d).reduce((a,r)=>{
    a.prot+=r.macros.prot; a.fat+=r.macros.fat; a.kcal+=r.macros.kcal;
    a.carbs += Math.max(0,(r.macros.kcal - r.macros.prot*4 - r.macros.fat*9)/4); return a;
  },{prot:0,fat:0,kcal:0,carbs:0});
}
/* Reparto de kcal por comida (para escalar una receta SUELTA a una ración tuya) */
const MEAL_SHARE = {desayuno:0.25, comida:0.40, merienda:0.12, cena:0.35};
function scaleRecipeToMeal(r, profile){
  const t = calcTargets(profile);
  const share = MEAL_SHARE[r.tipo] || 0.33;
  const f = r.macros.kcal>0 ? Math.min(1.8, Math.max(0.6, (t.kcal*share)/r.macros.kcal)) : 1;
  return scaleRecipe(r, f);
}
/* Emoji "héroe" de una receta: su proteína principal, si no el 1er alimento, si no el turno */
const heroEmoji = (r)=>{
  const foods = r.ing.map(it=>getFood(it.nombre));
  const main = foods.find(f=>f&&['carne','pescado','huevo','legumbre'].includes(f.cat)) || foods.find(Boolean);
  return main ? main.em : ({desayuno:"🥣",comida:"🍽️",merienda:"🍎",cena:"🌙"}[r.tipo]||"🍽️");
};
/* Otra receta del mismo turno. mainCat = categoría elegida; usePantry = solo si tengo el ingrediente principal */
function altRecipe(profile, despensa, tipo, excludeId, mainCat, usePantry){
  profile = normProfile(profile);
  const set = new Set((despensa||[]).map(i=>i.nombre.toLowerCase()));
  const mainOwned = r => { const m=recipeMainIng(r); return m && set.has(m.toLowerCase()); };
  const base = r => r.tipo===tipo && r.id!==excludeId && recipeAllowed(r,profile) && recipeMatchesMain(r,mainCat);
  let pool = RECIPES.filter(r=> base(r) && (usePantry ? mainOwned(r) : true));
  if(pool.length===0 && usePantry) pool = RECIPES.filter(r=> base(r));                                  // no tienes esa proteína en casa
  if(pool.length===0) pool = RECIPES.filter(r=> r.tipo===tipo && r.id!==excludeId && recipeMatchesMain(r,mainCat));
  if(pool.length===0) pool = RECIPES.filter(r=> r.tipo===tipo && r.id!==excludeId);
  if(pool.length===0) return excludeId;
  const rnd = mulberry32(((Date.now()>>>0) ^ (((excludeId?excludeId.length:0)*2654435761)>>>0)) >>> 0);
  const ranked = pool.map(r=>({r,sc:scoreRecipe(r, usePantry?set:new Set(), profile, rnd())})).sort((a,b)=>b.sc-a.sc);
  const top = ranked.slice(0, Math.min(8, ranked.length));
  return top[Math.floor(rnd()*top.length)].r.id;
}

/* Alimentos que se asumen en casa (no cuentan como "te falta") */
const STAPLES = new Set(["aceite de oliva virgen extra","limón","ajo","sal"]);
/* Sugerencia para CERRAR el objetivo del día: receta del turno, priorizando la
   despensa, escalada para aportar ~la proteína que te queda (repartida entre los
   huecos del día) sin pasarte del presupuesto de kcal. Devuelve receta escalada + lo que falta. */
function suggestForGap(profile, despensa, remaining, emptyCount, tipo, seed, usePantry, mainCat){
  profile = normProfile(profile);
  const set = new Set((despensa||[]).map(i=>i.nombre.toLowerCase()));
  const selSet = usePantry ? set : new Set();   // priorizar despensa solo en modo "con lo que tengo"
  const rnd = mulberry32((seed>>>0)||1);
  const tipoOk = r => tipo ? r.tipo===tipo : r.tipo!=="merienda";
  let pool = RECIPES.filter(r=> tipoOk(r) && recipeAllowed(r,profile) && recipeMatchesMain(r,mainCat));
  if(!pool.length) pool = RECIPES.filter(r=> tipoOk(r) && recipeMatchesMain(r,mainCat));   // ignora despensa/macros si hace falta
  if(!pool.length) pool = RECIPES.filter(r=> tipoOk(r) && recipeAllowed(r,profile));        // ignora la categoría si no hay
  if(!pool.length) pool = RECIPES.slice();
  const ranked = pool.map(r=>({r, sc:scoreRecipe(r,selSet,profile,rnd())})).sort((a,b)=>b.sc-a.sc);
  const base = ranked[Math.floor(rnd()*Math.min(5,ranked.length))].r;
  const slots = Math.max(1, emptyCount||1);
  const targetProt = Math.max(15, (remaining.prot||0)/slots);
  let f = base.macros.prot>0 ? targetProt/base.macros.prot : 1;
  const targetKcal = (remaining.kcal||0)/slots;
  if(targetKcal>0 && base.macros.kcal>0 && base.macros.kcal*f > targetKcal*1.25) f = (targetKcal*1.25)/base.macros.kcal;
  f = Math.min(2, Math.max(0.5, f));
  const scaled = scaleRecipe(base, f);
  const missing = scaled.ing.filter(it=> getFood(it.nombre) && !set.has(it.nombre.toLowerCase()) && !STAPLES.has(it.nombre.toLowerCase()));
  return {recipe:scaled, missing, usePantry:!!usePantry};
}

/* Generador de recetas a medida (algorítmico, sin IA/API, 100% offline).
   Compone un plato con proteína + verduras + grasa saludable (+cereal) priorizando
   lo que hay en casa, respetando dieta y objetivo, y calcula sus macros. */
function generarReceta(profile, despensa, seed){
  profile = normProfile(profile);
  const rnd = mulberry32((seed||1)>>>0);
  const plan = PLANS[profile.plan]||PLANS.lowcarb;
  const noLac = profile.sinLactosa || plan.exclude.includes('lacteo');
  const inSet = new Set((despensa||[]).map(i=>i.nombre.toLowerCase()));
  const have = f => inSet.has(f.nombre.toLowerCase());
  const okDiet = f => foodOk(f, profile);
  const antiinf = !!profile.antiinflamatoria;
  const sc = f => rnd() + (have(f)?3:0) + ((antiinf && f.tags.some(t=>['antiinflamatorio','omega3','fitoestrogenos'].includes(t)))?1.5:0);
  const low = s => s.charAt(0).toLowerCase()+s.slice(1);
  const clean = s => s.replace(/ cocid[oa]s?$/i,'').replace(/ al natural$/i,'');

  const protCats = ['carne','pescado','huevo','legumbre'].filter(c=>!plan.exclude.includes(c));
  const prot = DB.filter(f=>protCats.includes(f.cat)&&okDiet(f)&&f.nombre!=='Hummus'&&f.prot>=8).sort((a,b)=>sc(b)-sc(a))[0] || getFood('Huevo');
  const verds = DB.filter(f=>f.cat==='verdura'&&okDiet(f)).sort((a,b)=>sc(b)-sc(a));
  const v1 = verds[0], v2 = verds[1];
  const grasa = DB.filter(f=>f.cat==='grasa'&&okDiet(f)).sort((a,b)=>sc(b)-sc(a))[0] || getFood('Aceite de oliva virgen extra');
  const cereal = DB.filter(f=>f.cat==='cereal'&&okDiet(f)).sort((a,b)=>sc(b)-sc(a))[0];
  const aceite = getFood('Aceite de oliva virgen extra');

  const pn=clean(prot.nombre), v1n=clean(v1.nombre), v2n=clean(v2.nombre), cn=cereal?clean(cereal.nombre):'', gn=clean(grasa.nombre);
  const usaCereal = plan.carbMode==='balance' && !plan.exclude.includes('cereal') && profile.objetivo!=='adelgazar' && !!cereal;
  const base = [[prot,prot.porcion],[v1,v1.porcion],[v2,Math.round(v2.porcion*0.7)]];
  const baseC = (usaCereal&&cereal)?[...base,[cereal,cereal.porcion]]:base;
  const grillable = ['carne','pescado','huevo'].includes(prot.cat) || ['Tofu','Tempeh'].includes(prot.nombre);

  const M = {
    plancha:{ nombre: prot.nombre+' a la plancha con '+low(v1n), tiempo:25, ing:[...baseC,[aceite,10]],
      pasos:['Cocina '+low(pn)+' a la plancha 4-5 min por lado, con sal y pimienta.','Saltea '+low(v1n)+' y '+low(v2n)+' con un poco de aceite.', (usaCereal&&cereal)?'Sirve junto a '+low(cn)+' con un hilo de aceite.':'Sirve con un hilo de aceite y limón.'] },
    horno:{ nombre: prot.nombre+' al horno con '+low(v1n)+' y '+low(v2n), tiempo:35, ing:[...baseC,[aceite,10]],
      pasos:['Precalienta el horno a 200°C.','Coloca '+low(pn)+' con '+low(v1n)+' y '+low(v2n)+', aliña con aceite y sal.','Hornea 22-25 min.'+((usaCereal&&cereal)?' Acompaña con '+low(cn)+'.':'')] },
    salteado:{ nombre:'Salteado de '+low(pn)+' con '+low(v1n), tiempo:20, ing:[...baseC,[aceite,10]],
      pasos:['Calienta el aceite a fuego fuerte.','Saltea '+low(v1n)+' y '+low(v2n)+' 5-6 min.','Añade '+low(pn)+((usaCereal&&cereal)?' y '+low(cn):'')+'; saltea 4-5 min más.'] },
    ensalada:{ nombre:'Ensalada de '+low(pn)+', '+low(v1n)+' y '+low(gn), tiempo:12, ing:[[prot,prot.porcion],[v1,v1.porcion],[v2,Math.round(v2.porcion*0.7)],[grasa,grasa.porcion],[aceite,8]],
      pasos:['Trocea '+low(v1n)+' y '+low(v2n)+'.','Mézclalos con '+low(pn)+' y '+low(gn)+'.','Aliña con aceite, limón y hierbas.'] },
    estofado:{ nombre:'Estofado de '+low(pn)+' con '+low(v1n), tiempo:30, ing:[...baseC,[aceite,10]],
      pasos:['Sofríe '+low(v1n)+' y '+low(v2n)+' con el aceite.','Añade '+low(pn)+((usaCereal&&cereal)?' y '+low(cn):'')+' y un poco de agua o caldo.','Cuece 12-15 min y rectifica de sal.'] },
  };
  const opciones = grillable ? ['plancha','horno','salteado','ensalada'] : ['salteado','ensalada','estofado'];
  const r = M[opciones[Math.floor(rnd()*opciones.length)]];

  const foods = r.ing.map(x=>x[0]);
  const tags=[];
  ['omega3','fitoestrogenos','antiinflamatorio','calcio'].forEach(t=>{ if(foods.some(f=>f.tags.includes(t))) tags.push(t); });
  if(plan.exclude.includes('carne')&&plan.exclude.includes('pescado')) tags.push('veg'); if(noLac) tags.push('sinLactosa');
  const ing = r.ing.map(([f,g])=>({nombre:f.nombre,g}));
  return {id:'gen'+seed, tipo:'comida', generada:true, nombre:r.nombre, tiempo:r.tiempo, ing, pasos:r.pasos, tags, macros:sumMacros(ing)};
}

/* ============================================================
   ALMACENAMIENTO PERSISTENTE
   ============================================================ */
const KEY = "nutrimeno_v1";
const todayISO = () => { const d=new Date(); return d.getFullYear()+"-"+String(d.getMonth()+1).padStart(2,"0")+"-"+String(d.getDate()).padStart(2,"0"); };
const fmtDate = (iso) => { const [y,m,d]=iso.split("-"); const dt=new Date(+y,+m-1,+d);
  return dt.toLocaleDateString("es-ES",{weekday:"long",day:"numeric",month:"short"}); };
const weekdayIdx = () => (new Date().getDay()+6)%7; // 0 = Lunes
const saludo = () => { const h=new Date().getHours(); return h<12?"Buenos días":h<20?"Buenas tardes":"Buenas noches"; };

/* Enviar a WhatsApp — abre WhatsApp con el texto. El enlace temporal (target _blank)
   funciona en iPhone/PWA mejor que window.open (que iOS bloquea). Copia como red de seguridad. */
function shareText(title, text, toast){
  const url = "https://wa.me/?text=" + encodeURIComponent(text);
  try{ if(navigator.clipboard && navigator.clipboard.writeText) navigator.clipboard.writeText(text); }catch(e){}
  try{
    const a = document.createElement("a");
    a.href = url; a.target = "_blank"; a.rel = "noopener";
    document.body.appendChild(a); a.click(); document.body.removeChild(a);
    toast && toast("Abriendo WhatsApp… (lista también copiada)");
    return;
  }catch(e){}
  try{ window.open(url, "_blank"); return; }catch(e){}
  location.href = url;
}
/* Imprimir / guardar como PDF SIN ventanas emergentes (iOS las bloquea en la app).
   Pinta el contenido en una zona oculta y lanza la impresión de la página. */
function printHTML(innerHTML){
  let el = document.getElementById("printarea");
  if(!el){ el=document.createElement("div"); el.id="printarea"; document.body.appendChild(el); }
  el.innerHTML = innerHTML;
  document.body.classList.add("printing");
  setTimeout(()=>{ try{ window.print(); }catch(e){} setTimeout(()=>{ document.body.classList.remove("printing"); }, 800); }, 60);
}

const DEFAULT = {
  profile:{nombre:"", sexo:"", peso:"", altura:"", edad:"", actividad:"ligera", plan:"lowcarb", objetivo:"adelgazar",
           etapa:"ninguna", antiinflamatoria:true, snack:false, sinLactosa:false, sinGluten:false, sinFrutosSecos:false, sinHuevo:false, onboarded:false},
  dias:{},               // { iso: {ingredientes:[{nombre,g}]} }  ← SOLO lo que se ha comido (macros)
  menu:null,             // {seed, generadoEl, dias:[7]}
  despensa:[],           // [{nombre}]  ← lo que hay en casa (recetas + resta de la compra)
  comprado:{},           // {nombre:true}
  extraCompra:[],        // [{nombre,g}]  ← artículos propios añadidos a la lista
  stockLibre:"",
};

function useStore(){
  const [store,setStore] = useState(()=>{
    try{ const raw=localStorage.getItem(KEY); if(raw){ const s={...DEFAULT, ...JSON.parse(raw)}; s.profile=normProfile({...DEFAULT.profile, ...s.profile}); return s; } }catch(e){}
    return DEFAULT;
  });
  useEffect(()=>{ try{ localStorage.setItem(KEY, JSON.stringify(store)); }catch(e){} },[store]);
  return [store,setStore];
}

/* ============================================================
   COMPONENTES UI
   ============================================================ */
function MacroBar({label,have,target,color}){
  const pct = target>0 ? Math.min(100,Math.round(have/target*100)) : 0;
  return (
    <div className="mrow">
      <div className="mrow-top"><span>{label}</span><span className="v">{Math.round(have)} / {target} g</span></div>
      <div className="bar"><i style={{width:pct+"%",background:color}}/></div>
    </div>
  );
}
function MacroLimit({label,have,target,unidad}){
  const over = have > target + 0.5;
  const pct = target>0 ? Math.min(100,Math.round(have/target*100)) : 0;
  const left = Math.round(target - have);
  return (
    <div className="mrow">
      <div className="mrow-top">
        <span>{label}</span>
        <span className="v" style={over?{color:"var(--brand-d)",fontWeight:700}:null}>{over ? "⚠️ +"+Math.abs(left)+" "+unidad : "quedan "+left+" "+unidad}</span>
      </div>
      <div className="bar"><i style={{width:pct+"%",background:over?"var(--brand-d)":"var(--carb)"}}/></div>
    </div>
  );
}
function KcalRing({have,target}){
  const pct = target>0?Math.min(100,have/target):0;
  const R=44,C=2*Math.PI*R, off=C*(1-pct);
  return (
    <div className="kcal-ring">
      <svg width="100" height="100" viewBox="0 0 100 100">
        <circle cx="50" cy="50" r={R} fill="none" stroke="rgba(36,24,35,0.10)" strokeWidth="9"/>
        <circle cx="50" cy="50" r={R} fill="none" stroke="var(--kcal)" strokeWidth="9" strokeLinecap="round"
          strokeDasharray={C} strokeDashoffset={off} transform="rotate(-90 50 50)" style={{transition:"stroke-dashoffset .5s"}}/>
      </svg>
      <div className="big"><div><b>{Math.round(have)}</b><br/><span>de {target}</span><br/><span style={{fontSize:9}}>kcal</span></div></div>
    </div>
  );
}
function Toggle({on,onClick}){ return <div className={"toggle"+(on?" on":"")} onClick={onClick}><b/></div>; }
/* Anillo GRANDE para "lo que te queda hoy" (métrica protagonista = proteína) */
function RingBig({have,target,color}){
  const pct = target>0?Math.min(1,have/target):0; const R=58, C=2*Math.PI*R, off=C*(1-pct);
  const left = Math.max(0,Math.round(target-have)); const done = have>=target;
  return (
    <div className="ring-big">
      <svg width="140" height="140" viewBox="0 0 140 140">
        <circle cx="70" cy="70" r={R} fill="none" stroke="rgba(36,24,35,0.09)" strokeWidth="12"/>
        <circle cx="70" cy="70" r={R} fill="none" stroke={color||"var(--prot)"} strokeWidth="12" strokeLinecap="round"
          strokeDasharray={C} strokeDashoffset={off} transform="rotate(-90 70 70)" style={{transition:"stroke-dashoffset .6s ease"}}/>
      </svg>
      <div className="ring-c"><div><b>{Math.round(have)}</b><span>de {target} g<br/>proteína{done?" ✓":""}</span></div></div>
    </div>
  );
}
function Stepper({value,min=1,max=8,onChange,suffix}){
  return (
    <div className="stepper">
      <button onClick={()=>onChange(Math.max(min,value-1))} disabled={value<=min} aria-label="menos">−</button>
      <span className="val">{value}{suffix?(" "+suffix):""}</span>
      <button onClick={()=>onChange(Math.min(max,value+1))} disabled={value>=max} aria-label="más">＋</button>
    </div>
  );
}

/* Resumen del día: suma los macros del menú (ya escalado) y los enfrenta a la meta */
function DayMacros({profile, day}){
  const t = calcTargets(profile);
  const m = dayTotals(profile, day);
  const isCap = t.carbMode==="keto" || t.carbMode==="lowcarb";
  const protPct = t.prot ? Math.min(100,Math.round(m.prot/t.prot*100)) : 0;
  const kcalPct = t.kcal ? Math.min(100,Math.round(m.kcal/t.kcal*100)) : 0;
  const carbPct = t.carbs ? Math.min(100,Math.round(m.carbs/t.carbs*100)) : 0;
  const protOk  = m.prot >= t.prot*0.9;
  const carbOver= isCap && m.carbs > t.carbs + 2;
  const faltaP  = Math.round(t.prot - m.prot);
  const ok = protOk && !carbOver;
  return (
    <div className={"card daysum"+(carbOver?" warn-c":"")}>
      <h3><span className="em">📊</span> El menú de hoy <span className="ac" style={{fontStyle:"italic"}}>vs.</span> tu objetivo</h3>
      <div className="dm-grid">
        <div className="dm-row dm-prot">
          <div className="mrow-top"><span>🥩 Proteína</span><span className="v">{Math.round(m.prot)} / {t.prot} g</span></div>
          <div className="bar"><i style={{width:protPct+"%",background:"linear-gradient(90deg,var(--prot),#F0875A)"}}/></div>
        </div>
        <div className="dm-row">
          <div className="mrow-top"><span>🔥 Calorías</span><span className="v">{Math.round(m.kcal)} / {t.kcal} kcal</span></div>
          <div className="bar"><i style={{width:kcalPct+"%",background:"var(--kcal)"}}/></div>
        </div>
        <div className="dm-row">
          <div className="mrow-top">
            <span>🌾 Carbohidratos {isCap && <small style={{color:"var(--quiet)",fontWeight:400}}>· tope {t.carbs} g</small>}</span>
            <span className="v" style={carbOver?{color:"var(--brand-d)",fontWeight:700}:null}>{Math.round(m.carbs)}{isCap?(" / "+t.carbs):""} g</span>
          </div>
          <div className="bar"><i style={{width:carbPct+"%",background:carbOver?"var(--brand-d)":"var(--carb)"}}/></div>
        </div>
        <div className="dm-row">
          <div className="mrow-top"><span>🥑 Grasas</span><span className="v">{Math.round(m.fat)} g</span></div>
        </div>
      </div>
      {ok
        ? <div className="dm-verdict ok"><span className="em">✓</span><span>Tu menú de hoy cumple tu objetivo: proteína suficiente{isCap?" y dentro del tope de carbohidratos":""}.</span></div>
        : <div className="dm-verdict no"><span className="em">⚠️</span><span>
            {!protOk && <>Te faltan <b>{faltaP} g de proteína</b>: {profile.snack? "intercambia una comida (🔄) por otra más proteica." : "activa la merienda o intercambia una comida (🔄)."} </>}
            {carbOver && <>Hoy te pasas del tope de carbohidratos en <b>{Math.round(m.carbs-t.carbs)} g</b>.</>}
          </span></div>}
    </div>
  );
}

/* ---------------- PANTALLA PRINCIPAL: HOY (núcleo diario) ---------------- */
const SLOT_META = {desayuno:["☀️","Desayuno"], comida:["🍽️","Comida"], merienda:["🍎","Merienda"], cena:["🌙","Cena"]};
function Hoy({store,setStore,go,toast}){
  const iso = todayISO();
  const profile = store.profile;
  const despensa = store.despensa||[];
  const t = calcTargets(profile);
  const isCap = t.carbMode==="keto" || t.carbMode==="lowcarb";
  const plan = (store.dias && store.dias[iso]) || null;
  const havePlan = !!(plan && plan.desayuno);

  // Genera el plan del día al entrar, o si cambian los ajustes / quedó incoherente con el enfoque
  useEffect(()=>{ setStore(s=>{ const cur=(s.dias&&s.dias[iso])||{};
      const ok = cur.desayuno && [cur.desayuno,cur.comida,cur.cena].every(id=>{ const r=recipeById(id); return r && recipeAllowed(r, s.profile); });
      if(ok) return s;
      return {...s, dias:{...(s.dias||{}), [iso]:{...genDay(s.profile,s.despensa||[],Math.floor(Math.random()*1e9)), done:{}}}};
    });
  }, [profile.plan, profile.objetivo, profile.antiinflamatoria, profile.snack, profile.sinLactosa, profile.sinGluten, profile.sinFrutosSecos, profile.sinHuevo]);

  const [panel,setPanel] = useState(null);     // {slot, usePantry}
  const [pNombre,setPNombre] = useState("");

  const regenAll = ()=> setStore(s=>({...s, dias:{...(s.dias||{}), [iso]:{...genDay(s.profile,s.despensa||[],Math.floor(Math.random()*1e9)), done:{}}}}));
  const swapMeal = (slot,mainCat,usePantry)=> setStore(s=>{ const day={...((s.dias&&s.dias[iso])||{})}; day[slot]=altRecipe(s.profile,s.despensa||[],slot,day[slot],mainCat,usePantry); return {...s, dias:{...s.dias,[iso]:day}}; });
  const toggleDone = (slot)=> setStore(s=>{ const day={...((s.dias&&s.dias[iso])||{})}; const done={...(day.done||{})}; done[slot]=!done[slot]; day.done=done; return {...s, dias:{...s.dias,[iso]:day}}; });

  const addDespensa = (n)=>{ const f=getFood(n); const nombre=f?f.nombre:(n||"").trim(); if(!nombre){setPNombre("");return;} if(despensa.some(d=>d.nombre.toLowerCase()===nombre.toLowerCase())){setPNombre("");return;} setStore(st=>({...st,despensa:[...(st.despensa||[]),{nombre}]})); setPNombre(""); };
  const delDespensa = (nombre)=> setStore(st=>({...st,despensa:(st.despensa||[]).filter(d=>d.nombre!==nombre)}));
  const _sug=["Huevo","Pechuga de pollo","Pavo","Ternera magra","Salmón","Atún en aceite","Atún al natural","Sardinas en lata","Mejillones en lata","Yogur griego natural","Skyr","Queso fresco","Tomate","Cebolla","Espinaca","Brócoli","Calabacín","Pimiento","Aguacate","Almendras","Lentejas cocidas","Garbanzos cocidos","Aceitunas"];
  const quickDesp=_sug.filter(n=>{const f=getFood(n);return f&&foodOk(f,profile);}).filter(q=>!despensa.some(d=>d.nombre.toLowerCase()===q.toLowerCase())).slice(0,16);

  const planExclude = (PLANS[profile.plan]||PLANS.lowcarb).exclude;
  const availMains = MAIN_CATS.filter(([k])=> !planExclude.includes(k));

  const scaled = havePlan ? scaledDayRecipes(profile, plan) : [];
  const totals = havePlan ? dayTotals(profile, plan) : {prot:0,kcal:0,carbs:0,fat:0};
  const have = new Set(despensa.map(d=>d.nombre.toLowerCase()));
  const missOf = (r)=> r.ing.filter(it=> getFood(it.nombre) && !have.has(it.nombre.toLowerCase()) && !STAPLES.has(it.nombre.toLowerCase()));
  const planMissing = ()=>{ const m=[]; scaled.forEach(r=> missOf(r).forEach(it=>{ if(!m.some(x=>x.nombre===it.nombre)) m.push({nombre:it.nombre,g:it.g}); })); return m; };
  const addList = (items)=>{ if(!items||!items.length) return; setStore(st=>{ const ex=[...(st.extraCompra||[])]; items.forEach(it=>{ if(!ex.some(e=>e.nombre===it.nombre)){const f=getFood(it.nombre); ex.push({nombre:it.nombre,g:f?f.porcion:0});} }); return {...st,extraCompra:ex}; }); toast&&toast("Añadido a la compra ✓"); };

  const rem = (emoji,label,cons,target,mode)=>{
    const unit = label.toLowerCase().includes("cal") ? " kcal" : " g";
    const pct = target>0?Math.min(100,Math.round(cons/target*100)):0;
    const over = mode==="cap" ? cons>target+2 : false;
    const col = mode==="cap" ? (over?"var(--brand-d)":"var(--carb)") : "var(--kcal)";
    return (<div className="dm-row" key={label}><div className="mrow-top"><span>{emoji} {label}</span>
      <span className="v" style={over?{color:"var(--brand-d)",fontWeight:700}:null}>{Math.round(cons)} / {target}{unit}{mode==="cap"&&over?" ⚠️":""}</span></div>
      <div className="bar"><i style={{width:pct+"%",background:col}}/></div></div>);
  };

  return (
    <div>
      <div className="hero">
        <div className="hero-eyebrow">{fmtDate(iso)}</div>
        <h1 className="hero-hi">{saludo()}{profile.nombre ? <>, <i>{profile.nombre}</i></> : ""}.</h1>
      </div>

      {!profile.onboarded &&
        <div className="banner"><span className="em">👋</span>
          <span className="tx">Pon tus datos y tu objetivo para ajustar tus metas del día.</span>
          <button className="btn sm" onClick={()=>go("ajustes")}>Mis datos</button></div>}

      {/* TU PLAN DE HOY */}
      <div className="card daysum">
        <h3><span className="em">🎯</span> Tu plan de hoy</h3>
        <div className="ring-hero">
          <RingBig have={totals.prot} target={t.prot}/>
          <div className="ring-side">
            {rem("🔥","Calorías",totals.kcal,t.kcal,"budget")}
            {isCap && rem("🌾","Carbohidratos",totals.carbs,t.carbs,"cap")}
            {!isCap && rem("🥑","Grasas",totals.fat,t.fat,"budget")}
          </div>
        </div>
        {!havePlan ? <div className="hint" style={{marginTop:12}}>Preparando tu plan…</div>
         : totals.prot>=t.prot*0.95
          ? <div className="dm-verdict ok"><span className="em">✓</span><span>Tu plan de hoy cumple tu objetivo de proteína. Cambia lo que no te apetezca.</span></div>
          : <div className="hint" style={{marginTop:12}}>Tu plan se queda algo corto de proteína. Cambia una comida por carne, pescado o legumbre.</div>}
        {havePlan && <button className="btn sec" style={{marginTop:12}} onClick={regenAll}>🔄 Generar otro plan</button>}
      </div>

      {/* 1) ¿QUÉ TIENES EN CASA? (primero) */}
      <div className="card">
        <h3><span className="em">🧺</span> ¿Qué tienes en casa?</h3>
        <p className="hint" style={{margin:"-6px 0 12px"}}>Empieza por aquí: dime qué tienes y te sugiero recetas con ello. Lo que falte irá a la compra.</p>
        <div className="add-row">
          <div className="grow"><input type="text" list="dbfoods_desp" placeholder="Ej. pollo, atún en lata, tomate…" value={pNombre}
            onChange={e=>setPNombre(e.target.value)} onKeyDown={e=>{ if(e.key==="Enter"&&pNombre) addDespensa(pNombre); }}/>
            <datalist id="dbfoods_desp">{DB.map(f=><option key={f.nombre} value={f.nombre}/>)}</datalist></div>
          <button className="btn sm" style={{flex:"none"}} onClick={()=>pNombre&&addDespensa(pNombre)}>＋</button>
        </div>
        {quickDesp.length>0 && <><p className="label" style={{marginTop:12}}>Rápidos</p>
          <div className="quick">{quickDesp.map(q=><button key={q} onClick={()=>addDespensa(q)}>{getFood(q)?.em||"➕"} {q}</button>)}</div></>}
        {despensa.length>0 && <><p className="label" style={{marginTop:14}}>En casa ({despensa.length})</p>
          <div className="chips">{despensa.map(d=>{const f=getFood(d.nombre);return <span className="pchip" key={d.nombre}><span className="em">{f?f.em:"🛒"}</span>{d.nombre}<button className="x" onClick={()=>delDespensa(d.nombre)}>×</button></span>;})}</div></>}
      </div>

      {/* 2) TUS COMIDAS DE HOY (plan automático) */}
      {scaled.map(r=>{ const slot=r.tipo; const meta=SLOT_META[slot]||["🍽️",slot]; const done=plan&&plan.done&&plan.done[slot]; const miss=missOf(r); const isOpen=panel&&panel.slot===slot;
        return (
          <div className={"card"+(done?" done-meal":"")} key={slot}>
            <div className="ctl-row" style={{marginBottom:10}}>
              <div className="tx">{meta[0]} {meta[1]}</div>
              <button className={"swap-btn"+(done?" on":"")} onClick={()=>toggleDone(slot)}>{done?"✓ Hecho":"Marcar hecho"}</button>
            </div>
            <RecipeCard r={r} defaultOpen={false}/>
            {miss.length>0 &&
              <div className="cocina-tags" style={{marginTop:8}}>
                <span className="match miss">Te falta: {miss.map(x=>x.nombre).join(", ")}</span>
                <button className="match addc" onClick={()=>addList(miss)}>🛒 + a la compra</button>
              </div>}
            {!isOpen
              ? <button className="btn sec" style={{marginTop:8}} onClick={()=>setPanel({slot,usePantry:false})}>🔄 Cambiar esta comida</button>
              : <div style={{marginTop:10}}>
                  <p className="label" style={{marginBottom:7}}>Cambiar por…</p>
                  <div className="seg" style={{flexWrap:"wrap",marginBottom:9}}>
                    <button onClick={()=>swapMeal(slot,"",panel.usePantry)}>🔄 Otra</button>
                    {availMains.map(([k,em,lab])=><button key={k} onClick={()=>swapMeal(slot,k,panel.usePantry)}>{em} {lab}</button>)}
                  </div>
                  <div className="switch" style={{padding:"6px 0",borderTop:"none"}}><div className="tx" style={{fontSize:13.5}}>🧺 Solo con lo que tengo en casa</div>
                    <Toggle on={!!panel.usePantry} onClick={()=>setPanel(p=>({...p,usePantry:!p.usePantry}))}/></div>
                  <button className="btn ghost" style={{marginTop:4}} onClick={()=>setPanel(null)}>Cerrar</button>
                </div>}
          </div>
        );
      })}

      {havePlan && planMissing().length>0 &&
        <button className="btn" style={{marginTop:2}} onClick={()=>addList(planMissing())}>🛒 Añadir a la compra lo que me falta ({planMissing().length})</button>}

      <button className="btn sec" onClick={()=>go("menu")}>📅 Planificar la semana entera</button>
      <p className="disclaimer">Orientación nutricional general (Mifflin-St Jeor). No sustituye el consejo de tu médico o dietista-nutricionista.</p>
    </div>
  );
}

/* ---------------- PANTALLA 1: INICIO (objetivo + despensa) ---------------- */
function Registro({store,setStore,go}){
  const iso = todayISO();
  const targets = useMemo(()=>calcTargets(store.profile),[store.profile]);
  const plan = PLANS[store.profile.plan]||PLANS.lowcarb;

  const addDespensa = (n)=>{
    const f=getFood(n); const nombre = f?f.nombre:(n||"").trim();
    if(!nombre){ setPNombre(""); return; }
    if(despensa.some(d=>d.nombre.toLowerCase()===nombre.toLowerCase())){ setPNombre(""); return; }
    setStore(s=>({...s, despensa:[...(s.despensa||[]), {nombre}]}));
    setPNombre("");
  };
  const delDespensa = (nombre)=> setStore(s=>({...s, despensa:(s.despensa||[]).filter(d=>d.nombre!==nombre)}));
  const crearMenu = ()=>{ setStore(s=>({...s, menu:{seed:Math.floor(Math.random()*99999), generadoEl:iso,
                    dias: genMenu(s.profile, s.despensa||[], Math.floor(Math.random()*99999))}})); go("menu"); };

  const _sugeridos = ["Huevo","Pechuga de pollo","Pavo","Ternera magra","Salmón","Atún al natural","Gambas","Yogur griego natural","Skyr","Queso fresco","Tomate","Cebolla","Ajo","Espinaca","Brócoli","Calabacín","Pimiento","Aguacate","Aceite de oliva virgen extra","Almendras","Nueces","Lentejas cocidas","Garbanzos cocidos","Tofu","Arroz integral cocido","Avena","Plátano","Manzana","Limón"];
  const quickDesp = _sugeridos.filter(n=>{ const f=getFood(n); return f && foodOk(f, store.profile); }).slice(0,18);

  return (
    <div>
      <div className="hero">
        <div className="hero-eyebrow">{fmtDate(iso)}</div>
        <h1 className="hero-hi">{saludo()}{store.profile.nombre ? <>, <i>{store.profile.nombre}</i></> : ""}.</h1>
      </div>

      {!store.profile.onboarded &&
        <div className="banner">
          <span className="em">👋</span>
          <span className="tx">Personaliza tus datos para ajustar tu plan y tus metas.</span>
          <button className="btn sm" onClick={()=>go("ajustes")}>Ajustes</button>
        </div>}

      {/* OBJETIVO (metas del día) */}
      <div className="card">
        <h3><span className="em">🎯</span> Tu objetivo</h3>
        <div className="prot-hero">
          <div className="ph-top">
            <span className="ph-label">🥩 Proteína al día</span>
            <span className="ph-val"><b>{targets.prot}</b> g</span>
          </div>
          <div className="ph-note">Tu prioridad para preservar la masa muscular.</div>
        </div>
        <div className="techos">
